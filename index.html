<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AethricAdvisor - Build Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        charcoal: '#1a1a1a',
                        darkred: '#8B0000',
                        gold: '#DAA520',
                        darkgold: '#B8860B',
                        ember: '#CD5C5C',
                        slate: '#2d2d2d',
                        obsidian: '#0d0d0d'
                    },
                    fontFamily: {
                        cinzel: ['Cinzel', 'serif'],
                        inter: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #1a1a1a; }
        .scrollbar-dark::-webkit-scrollbar { width: 8px; }
        .scrollbar-dark::-webkit-scrollbar-track { background: #2d2d2d; }
        .scrollbar-dark::-webkit-scrollbar-thumb { background: #8B0000; border-radius: 4px; }
        .glow-gold { box-shadow: 0 0 10px rgba(218, 165, 32, 0.3); }
        .glow-red { box-shadow: 0 0 10px rgba(139, 0, 0, 0.5); }
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-slow { animation: pulse-slow 2s ease-in-out infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); } 20%, 40%, 60%, 80% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-charcoal text-white font-inter min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useContext, createContext, useRef, useCallback } = React;

        // ============ BUILD INFO ============
        const BUILD_TIMESTAMP = '2026-03-17T16:30:00Z';

        // ============ PASSWORD ============
        const APP_PASSWORD = 'AethricApp!984';
        const SESSION_AUTH_KEY = 'aethric_authenticated';

        // ============ CONSTANTS ============
        const FACTIONS = {
            'Knights of Inferno': { emoji: '🔥', element: 'Fire', bonus: '+25% fire, -20% fire taken' },
            'Earthen Legion': { emoji: '🌍', element: 'Earth', bonus: '+25% earth, -20% earth taken' },
            'Stormforce': { emoji: '⚡', element: 'Lightning', bonus: '+25% lightning, -20% lightning taken' },
            'Frozenguard': { emoji: '❄️', element: 'Ice', bonus: '+25% ice, -20% ice taken' }
        };

        const GAMES = ['Hero of Aethric', 'Orna: The GPS RPG'];
        const PLAYSTYLES = ['Physical DPS', 'Tank', 'Mage DPS', 'Hybrid', 'Endgame Raid'];
        const QUALITIES = ['Broken', 'Poor', 'Common', 'Superior', 'Famed', 'Legendary', 'Ornate'];
        const TIERS = ['T1', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'T8', 'T9', 'T10'];
        const SLOTS = ['Weapon', 'Off-hand', 'Head', 'Torso', 'Legs', 'Accessory'];
        const SLOT_KEYS = ['weapon', 'offhand', 'head', 'torso', 'legs', 'accessory1', 'accessory2'];
        const USEABLE_BY = ['All Classes', 'Warrior Classes', 'Mage Classes', 'Thief Classes', 'Melee Classes'];
        const ELEMENTS = ['None', 'Fire', 'Water', 'Ice', 'Lightning', 'Earth', 'Holy', 'Dark', 'Arcane'];
        const SPECIAL_PROPERTIES = [
            'Causes Bleeding', 'Causes Poison', 'Causes Stun', 'Causes Blind', 'Causes Blight',
            'Gives Att↑', 'Gives Def↑', 'Gives Mag↑', 'Gives Ward↑', 'Gold Bonus', 'Orn Bonus'
        ];
        const STATS = ['attack', 'defense', 'resistance', 'hp', 'mana', 'ward', 'magic', 'dexterity', 'foresight', 'crit'];
        const STAT_LABELS = { attack: 'Attack', defense: 'Defense', resistance: 'Resistance', hp: 'HP', mana: 'Mana', ward: 'Ward%', magic: 'Magic', dexterity: 'Dexterity', foresight: 'Foresight', crit: 'Crit%' };

        const EMPTY_GEAR = {
            name: '', quality: 'Legendary', tier: 'T7', level: '', slot: 'Weapon', useableBy: 'All Classes',
            element: 'None', abilityName: '', abilityDesc: '',
            stats: { attack: '', defense: '', resistance: '', hp: '', mana: '', ward: '', magic: '', dexterity: '', foresight: '', crit: '' },
            statMods: { attack: '+', defense: '+', resistance: '+', hp: '+', mana: '+', ward: '+', magic: '+', dexterity: '+', foresight: '+', crit: '+' },
            specialProperties: [], materials: '', notes: ''
        };

        const SKILL_ROLES = ['Primary Damage', 'Ward', 'Buff', 'Debuff', 'Heal-Cleanse', 'Utility', 'Passive'];
        const SKILL_ELEMENTS = ['Fire', 'Water', 'Earth', 'Lightning', 'Holy', 'Dark', 'Arcane', 'Dragon', 'Wind', 'Physical', 'None'];
        const SKILL_TARGETS = ['Self', 'Single Enemy', 'All Enemies', 'Single Ally', 'All Allies', 'Party'];
        const ADVISOR_SCENARIOS = ['Overworld Grinding', 'Dungeon', 'Raid', 'Boss Fight', 'PvP'];
        const ENEMY_ELEMENTS = ['None', 'Fire', 'Water', 'Earth', 'Lightning', 'Holy', 'Dark', 'Arcane', 'Dragon'];

        const LOADING_MESSAGES = [
            "Analyzing your arsenal...",
            "Consulting the war council...",
            "Optimizing for maximum carnage...",
            "Reading the ancient tomes...",
            "Channeling tactical wisdom..."
        ];

        const ROLE_COLORS = {
            'Ward': 'bg-green-900/60 text-green-400 border-green-700',
            'Buff': 'bg-blue-900/60 text-blue-400 border-blue-700',
            'Debuff': 'bg-yellow-900/60 text-yellow-400 border-yellow-700',
            'Primary Damage': 'bg-red-900/60 text-red-400 border-red-700',
            'Heal-Cleanse': 'bg-white/10 text-white border-gray-500',
            'Utility': 'bg-gray-700/60 text-gray-300 border-gray-600',
            'Passive': 'bg-purple-900/60 text-purple-400 border-purple-700'
        };

        // ============ DEFAULT PROFILES ============
        const createDefaultLoadout = () => ({
            head: null, torso: null, legs: null, weapon: null, offhand: null, accessory1: null, accessory2: null,
            skills: Array(12).fill(null)
        });

        const DEFAULT_PROFILES = [
            {
                id: 'biffius-default',
                name: 'Biffius',
                game: 'Hero of Aethric',
                classSpec: 'Paladin · Inquisitor',
                tier: 7,
                level: 150,
                faction: 'Knights of Inferno',
                playstyle: 'Endgame Raid',
                endgameTarget: 'Gilgamesh (Spiked Shield)',
                knownWeaknesses: 'Resistance critically low at 148. Prioritise Res over Def for head/torso.',
                currentStats: { hp: 4452, ward: 3005, attack: 1086, defense: 1689, resistance: 148, dexterity: 148, foresight: 340, crit: 5 },
                loadout: createDefaultLoadout(),
                skillDatabase: [],
                savedRecommendations: {},
                ornsAvailable: 0,
                metaNotes: '',
                lastMetaUpdate: null
            },
            {
                id: 'spiffius-default',
                name: 'Spiffius',
                game: 'Orna: The GPS RPG',
                classSpec: 'Archduid · Magus',
                tier: 7,
                level: 158,
                faction: 'Knights of Inferno',
                playstyle: 'Mage DPS',
                endgameTarget: 'Omnimancer',
                knownWeaknesses: 'Accessories undertiered at T4. Mana management on long dungeon floors.',
                currentStats: { hp: 0, ward: 0, attack: 0, defense: 0, resistance: 0, dexterity: 0, foresight: 0, crit: 0, mana: 0, magic: 0 },
                loadout: createDefaultLoadout(),
                skillDatabase: [],
                savedRecommendations: {},
                ornsAvailable: 723055,
                metaNotes: '',
                lastMetaUpdate: null
            }
        ];

        // ============ CONTEXT ============
        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [profiles, setProfiles] = useState(() => {
                const saved = localStorage.getItem('aethric_profiles_v3');
                if (saved) return JSON.parse(saved);
                const v2 = localStorage.getItem('aethric_profiles_v2');
                if (v2) {
                    const migrated = JSON.parse(v2).map(p => ({ ...p, skillDatabase: p.skillDatabase || [], savedRecommendations: p.savedRecommendations || {} }));
                    return migrated;
                }
                return DEFAULT_PROFILES;
            });
            const [activeProfileId, setActiveProfileId] = useState(() => {
                return localStorage.getItem('aethric_active_profile') || DEFAULT_PROFILES[0].id;
            });
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('aethric_api_key') || '');
            const [evaluationHistory, setEvaluationHistory] = useState(() => {
                const saved = localStorage.getItem('aethric_eval_history_v2');
                return saved ? JSON.parse(saved) : {};
            });
            const [activeTab, setActiveTab] = useState('advisor');

            useEffect(() => { localStorage.setItem('aethric_profiles_v3', JSON.stringify(profiles)); }, [profiles]);
            useEffect(() => { localStorage.setItem('aethric_active_profile', activeProfileId); }, [activeProfileId]);
            useEffect(() => { localStorage.setItem('aethric_api_key', apiKey); }, [apiKey]);
            useEffect(() => { localStorage.setItem('aethric_eval_history_v2', JSON.stringify(evaluationHistory)); }, [evaluationHistory]);

            const activeProfile = profiles.find(p => p.id === activeProfileId) || profiles[0];

            const updateProfile = (updates) => {
                setProfiles(prev => prev.map(p => p.id === activeProfileId ? { ...p, ...updates } : p));
            };

            const updateLoadout = (slotKey, item) => {
                setProfiles(prev => prev.map(p => {
                    if (p.id !== activeProfileId) return p;
                    return { ...p, loadout: { ...p.loadout, [slotKey]: item } };
                }));
            };

            const updateSkillSlot = (index, skill) => {
                setProfiles(prev => prev.map(p => {
                    if (p.id !== activeProfileId) return p;
                    const skills = [...p.loadout.skills];
                    skills[index] = skill;
                    return { ...p, loadout: { ...p.loadout, skills } };
                }));
            };

            const addSkillsToDatabase = (newSkills) => {
                setProfiles(prev => prev.map(p => {
                    if (p.id !== activeProfileId) return p;
                    const existing = p.skillDatabase || [];
                    const updated = [...existing];
                    let addedCount = 0, updatedCount = 0;
                    newSkills.forEach(skill => {
                        const idx = updated.findIndex(s => s.name.toLowerCase() === skill.name.toLowerCase());
                        if (idx >= 0) {
                            updated[idx] = { ...updated[idx], ...skill };
                            updatedCount++;
                        } else {
                            updated.push(skill);
                            addedCount++;
                        }
                    });
                    return { ...p, skillDatabase: updated };
                }));
            };

            const saveRecommendation = (scenario, recommendation) => {
                setProfiles(prev => prev.map(p => {
                    if (p.id !== activeProfileId) return p;
                    return {
                        ...p,
                        savedRecommendations: {
                            ...(p.savedRecommendations || {}),
                            [scenario]: { ...recommendation, timestamp: new Date().toISOString() }
                        }
                    };
                }));
            };

            const addEvaluation = (evaluation) => {
                setEvaluationHistory(prev => {
                    const profileHistory = prev[activeProfileId] || [];
                    const updated = [{ ...evaluation, timestamp: new Date().toISOString() }, ...profileHistory].slice(0, 10);
                    return { ...prev, [activeProfileId]: updated };
                });
            };

            const addProfile = (profile) => {
                const newProfile = { ...DEFAULT_PROFILES[0], ...profile, id: `profile-${Date.now()}`, loadout: createDefaultLoadout(), skillDatabase: [], savedRecommendations: {} };
                setProfiles(prev => [...prev, newProfile]);
                setActiveProfileId(newProfile.id);
            };

            const deleteProfile = (id) => {
                if (profiles.length <= 1) return;
                setProfiles(prev => prev.filter(p => p.id !== id));
                if (activeProfileId === id) setActiveProfileId(profiles.find(p => p.id !== id)?.id);
            };

            return (
                <AppContext.Provider value={{
                    profiles, activeProfile, activeProfileId, setActiveProfileId, updateProfile,
                    updateLoadout, updateSkillSlot, addSkillsToDatabase, saveRecommendation,
                    apiKey, setApiKey, evaluationHistory, addEvaluation,
                    activeTab, setActiveTab, addProfile, deleteProfile
                }}>
                    {children}
                </AppContext.Provider>
            );
        };

        // ============ API SERVICE ============
        const estimateTokens = (text) => Math.ceil(text.length / 4);
        const estimateCost = (inputTokens, outputTokens) => {
            const inputCost = (inputTokens / 1000000) * 3;
            const outputCost = (outputTokens / 1000000) * 15;
            return (inputCost + outputCost).toFixed(4);
        };

        const buildCompactPrompt = (profile, slot, currentItem, newItem) => {
            const faction = FACTIONS[profile.faction];
            return `Gear advisor for ${profile.game}. Evaluate for: ${profile.classSpec}, ${profile.playstyle}, T${profile.tier}.
Faction: ${profile.faction} (${faction?.bonus}).
CRITICAL: ${profile.knownWeaknesses}
Current ${slot}: ${currentItem ? JSON.stringify(currentItem) : 'Empty'}
New item: ${JSON.stringify(newItem)}
Return JSON only: {"verdict":"Upgrade|Sidegrade|Downgrade|Skip","color":"green|yellow|red","reason":"<50 words","flags":["array"],"priority":1-5}`;
        };

        const callClaudeAPI = async (apiKey, prompt, useWebSearch = false) => {
            const tools = useWebSearch ? [{ type: "web_search_20250305", name: "web_search", max_uses: 5 }] : undefined;
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 500,
                    messages: [{ role: 'user', content: prompt }],
                    ...(tools && { tools })
                })
            });
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API request failed');
            }
            return response.json();
        };

        const callClaudeVisionAPI = async (apiKey, imageBase64, mediaType) => {
            const prompt = `You are AethricAdvisor's skill extraction engine for Hero of Aethric / Orna: The GPS RPG.

Extract every skill/spell visible in this screenshot. For each one, return a JSON object with:
- name: exact skill name as shown
- description: the full description text visible
- mana_cost: number (0 if passive or not shown)
- element: Fire/Water/Earth/Lightning/Holy/Dark/Arcane/Dragon/Wind/Physical/None — infer from description and name
- turns_required: 1 (instant), 2, or 3 — infer from description, default to 1 if not stated
- target: Self / Single Enemy / All Enemies / Single Ally / All Allies / Party — infer from description
- role: one of [Primary Damage, Ward, Buff, Debuff, Heal-Cleanse, Utility, Passive] — infer from what the skill does
- causes: array of status effects it inflicts (e.g. ["Blind", "Burning", "Def↓↓"])
- gives: array of buffs it grants (e.g. ["Def↑↑", "Ward restore", "Att↑"])
- cures: array of effects it removes (e.g. ["Poisoned", "All common status effects"])
- is_multi_hit: boolean
- hit_count: number if multi-hit, otherwise 1
- power_estimate: "low" / "medium" / "high" / "very high" — infer from power numbers or description language
- notes: any other relevant info from the description

Return ONLY a JSON array of skill objects, no other text.`;

            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 4000,
                    messages: [{
                        role: 'user',
                        content: [
                            { type: 'image', source: { type: 'base64', media_type: mediaType, data: imageBase64 } },
                            { type: 'text', text: prompt }
                        ]
                    }]
                })
            });
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API request failed');
            }
            return response.json();
        };

        const callLoadoutAdvisorAPI = async (apiKey, profile, skillDatabase, scenario, enemyElement) => {
            const faction = FACTIONS[profile.faction];
            const systemPrompt = `You are AethricAdvisor, a combat loadout advisor for Hero of Aethric / Orna: The GPS RPG.

Given the player's character profile, available skills, current gear, and the selected combat scenario, recommend an optimal skill loadout and turn-by-turn combat sequence.

Your response must be a JSON object with:
{
  "recommended_loadout": [
    { "slot": 1, "skill_name": "skill name", "role": "Ward/Buff/Debuff/Damage/etc", "reason": "brief reason" }
  ],
  "turn_sequence": [
    { "turn": 1, "action": "skill name", "rationale": "why this turn" }
  ],
  "warnings": ["any gaps or concerns"],
  "element_notes": "elemental matchup advice if enemy element specified",
  "alternative_skills": [
    { "skill_name": "name", "use_case": "when to swap this in" }
  ],
  "overall_strategy": "2-3 sentence summary"
}

Rules:
- For Dungeon/Raid/Boss: Ward first, then buffs, then debuffs, then damage
- For Overworld: fewest turns to kill, AoE if available
- For PvP: debuffs first, then buffs, then damage
- Tank builds: weight survivability over damage
- Mage builds: weight elemental coverage and mana efficiency
- Flag critical gaps (no Ward, no cleanse, no AoE, low elemental coverage)
- Consider faction bonuses (${profile.faction} = ${faction?.element} synergy)
- Factor in meta notes if provided`;

            const userPrompt = `Character: ${profile.name}
Game: ${profile.game}
Class: ${profile.classSpec}
Tier: T${profile.tier}, Level ${profile.level}
Faction: ${profile.faction}
Playstyle: ${profile.playstyle}
Known Weaknesses: ${profile.knownWeaknesses}
Current Stats: ${JSON.stringify(profile.currentStats)}

Scenario: ${scenario}
Enemy Element: ${enemyElement || 'Unknown'}

Available Skills (${skillDatabase.length} total):
${JSON.stringify(skillDatabase, null, 2)}

${profile.metaNotes ? `Meta Notes:\n${profile.metaNotes}` : ''}

Recommend the optimal loadout and turn sequence for this scenario.`;

            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 2000,
                    system: systemPrompt,
                    messages: [{ role: 'user', content: userPrompt }]
                })
            });
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API request failed');
            }
            return response.json();
        };

        // ============ COMPONENTS ============

        // Password Gate
        const PasswordGate = ({ children }) => {
            const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem(SESSION_AUTH_KEY) === 'true');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [isShaking, setIsShaking] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (password === APP_PASSWORD) {
                    sessionStorage.setItem(SESSION_AUTH_KEY, 'true');
                    setIsAuthenticated(true);
                } else {
                    setError('Incorrect password');
                    setIsShaking(true);
                    setTimeout(() => setIsShaking(false), 500);
                    setPassword('');
                }
            };

            if (isAuthenticated) return children;

            return (
                <div className="fixed inset-0 bg-obsidian flex items-center justify-center z-[9999]">
                    <div className={`bg-charcoal border-2 border-darkred/50 rounded-lg p-8 max-w-md w-full mx-4 ${isShaking ? 'animate-shake' : ''}`}>
                        <div className="text-center mb-8">
                            <h1 className="font-cinzel text-3xl text-gold mb-2">AethricAdvisor</h1>
                            <p className="text-gray-400 text-sm">Enter password to access</p>
                        </div>
                        <form onSubmit={handleSubmit}>
                            <input type="password" value={password} onChange={(e) => { setPassword(e.target.value); setError(''); }}
                                placeholder="Password..." autoFocus
                                className="w-full bg-slate border border-gray-700 rounded-lg px-4 py-3 text-center mb-4 focus:outline-none focus:border-gold" />
                            {error && <div className="mb-4 p-3 bg-red-900/30 border border-red-700/50 rounded text-red-400 text-sm text-center">{error}</div>}
                            <button type="submit" className="w-full py-3 bg-darkred/70 hover:bg-darkred text-white font-cinzel rounded-lg">Enter</button>
                        </form>
                    </div>
                </div>
            );
        };

        // Header
        const Header = () => {
            const { activeProfile, profiles, activeProfileId, setActiveProfileId } = useContext(AppContext);
            const faction = FACTIONS[activeProfile.faction];
            const buildDate = new Date(BUILD_TIMESTAMP);
            const buildStr = buildDate.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
            return (
                <header className="bg-obsidian border-b border-darkred/50 sticky top-0 z-50">
                    <div className="max-w-6xl mx-auto px-4 py-3">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <h1 className="font-cinzel text-xl md:text-2xl text-gold">AethricAdvisor</h1>
                                <span className="text-[10px] text-gray-600 hidden sm:inline" title={BUILD_TIMESTAMP}>v{buildStr}</span>
                            </div>
                            <select value={activeProfileId} onChange={(e) => setActiveProfileId(e.target.value)}
                                className="bg-slate border border-darkred/50 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-gold">
                                {profiles.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                            </select>
                        </div>
                        <div className="mt-2 flex items-center justify-between text-sm">
                            <div className="flex items-center gap-2">
                                <span className="text-2xl">{faction?.emoji}</span>
                                <span className="text-gold font-cinzel">{activeProfile.name}</span>
                                <span className="text-gray-400">·</span>
                                <span className="text-gray-300">{activeProfile.classSpec}</span>
                                <span className="bg-darkred/50 px-2 py-0.5 rounded text-xs">T{activeProfile.tier}</span>
                            </div>
                            <span className="text-[10px] text-gray-600 sm:hidden" title={BUILD_TIMESTAMP}>v{buildStr}</span>
                        </div>
                    </div>
                </header>
            );
        };

        // Tab Navigation
        const TabNav = () => {
            const { activeTab, setActiveTab } = useContext(AppContext);
            const tabs = [
                { id: 'advisor', label: 'Advisor', icon: '⚔️' },
                { id: 'skills', label: 'Skills', icon: '✨' },
                { id: 'loadout', label: 'Loadout', icon: '🎒' },
                { id: 'gear', label: 'Gear', icon: '🛡️' },
                { id: 'profile', label: 'Profile', icon: '👤' },
                { id: 'meta', label: 'Meta', icon: '📊' }
            ];
            return (
                <>
                    <nav className="hidden md:block bg-slate border-b border-darkred/30 sticky top-[72px] z-40">
                        <div className="max-w-6xl mx-auto px-4 flex">
                            {tabs.map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                    className={`px-4 py-3 text-sm font-medium ${activeTab === tab.id ? 'text-gold border-b-2 border-gold' : 'text-gray-400 hover:text-white'}`}>
                                    {tab.label}
                                </button>
                            ))}
                        </div>
                    </nav>

                                placeholder="Optional" className="w-full bg-charcoal border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-gold" />

                    </div>

                    <div>
                        <label className="block text-xs text-gray-500 mb-2">Stats (use +/- to indicate bonus or penalty)</label>
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-2">
                            {STATS.map(stat => (
                                <div key={stat} className="flex items-center gap-1">
                                    <select value={gear.statMods[stat]} onChange={(e) => updateMod(stat, e.target.value)}
                                        className="bg-charcoal border border-gray-700 rounded px-1 py-1 text-sm w-10">
                                        <option>+</option>
                                        <option>-</option>
                                    </select>
                                    <input type="number" inputMode="numeric" value={gear.stats[stat]} onChange={(e) => updateStat(stat, e.target.value)}
                                        placeholder="0" className="flex-1 bg-charcoal border border-gray-700 rounded px-2 py-1 text-sm w-16" />
                                    <span className="text-xs text-gray-500 w-12 truncate">{STAT_LABELS[stat]}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div>
                        <label className="block text-xs text-gray-500 mb-2">Special Properties</label>
                        <div className="flex flex-wrap gap-2">

                                    <input type="checkbox" checked={gear.specialProperties.includes(prop)} onChange={() => toggleProperty(prop)}
                                        className="rounded border-gray-600 bg-charcoal text-gold focus:ring-gold" />

        // ============ LOADOUT ADVISOR TAB (AI-POWERED) ============
        const AdvisorTab = () => {

            const [scenario, setScenario] = useState('Dungeon');
            const [enemyElement, setEnemyElement] = useState('None');
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');
            const [result, setResult] = useState(null);

            const skillDatabase = activeProfile.skillDatabase || [];
            const savedRec = activeProfile.savedRecommendations?.[scenario];
            const lastMeta = activeProfile.lastMetaUpdate ? new Date(activeProfile.lastMetaUpdate) : null;
            const lastRec = savedRec?.timestamp ? new Date(savedRec.timestamp) : null;
            const metaNewerThanRec = lastMeta && lastRec && lastMeta > lastRec;

            const getRecommendation = async () => {
                if (!apiKey) { setError('Please enter your API key in the Profile tab'); return; }
                if (skillDatabase.length === 0) { setError('No skills in database. Upload screenshots in the Skills tab first.'); return; }

                setIsLoading(true);
                setError('');
                setResult(null);

                try {
                    const response = await callLoadoutAdvisorAPI(apiKey, activeProfile, skillDatabase, scenario, enemyElement !== 'None' ? enemyElement : null);
                    const textContent = response.content.find(c => c.type === 'text')?.text || '';
                    const jsonMatch = textContent.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        const parsed = JSON.parse(jsonMatch[0]);
                        setResult(parsed);
                        saveRecommendation(scenario, parsed);
                    } else {
                        setError('Failed to parse recommendation');
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const displayResult = result || savedRec;

            return (
                <div className="space-y-6 pb-20 md:pb-0">
                    <div className="text-center mb-6">
                        <h2 className="font-cinzel text-2xl text-gold">Loadout Advisor</h2>
                        <p className="text-sm text-gray-400 mt-1">AI-powered combat optimization</p>
                    </div>

                    {/* Scenario Selection */}
                    <div className="bg-gradient-to-br from-slate/60 to-obsidian/80 border border-gold/30 rounded-lg p-4">
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-xs text-gray-500 mb-1">Scenario</label>
                                <select value={scenario} onChange={(e) => setScenario(e.target.value)}
                                    className="w-full bg-charcoal border border-gold/30 rounded px-3 py-2 text-sm focus:outline-none focus:border-gold">
                                    {ADVISOR_SCENARIOS.map(s => <option key={s}>{s}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 mb-1">Enemy Element (optional)</label>
                                <select value={enemyElement} onChange={(e) => setEnemyElement(e.target.value)}
                                    className="w-full bg-charcoal border border-gold/30 rounded px-3 py-2 text-sm focus:outline-none focus:border-gold">
                                    {ENEMY_ELEMENTS.map(e => <option key={e}>{e}</option>)}
                                </select>
                            </div>
                        </div>
                        <button onClick={getRecommendation} disabled={isLoading || skillDatabase.length === 0}
                            className="w-full mt-4 py-3 bg-gold/20 text-gold font-cinzel rounded hover:bg-gold/30 disabled:opacity-50 transition-colors">
                            {isLoading ? 'Consulting the War Council...' : 'Get Recommendation'}
                        </button>
                        <div className="flex justify-between text-xs text-gray-600 mt-2">
                            <span>{skillDatabase.length} skills in database</span>
                            <span>Last meta: {lastMeta?.toLocaleDateString() || 'Never'}</span>
                        </div>
                    </div>

                    {/* Meta refresh prompt */}
                    {metaNewerThanRec && (
                        <div className="bg-yellow-900/30 border border-yellow-700/50 rounded-lg p-3 text-yellow-400 text-sm flex items-center justify-between">
                            <span>Meta has changed since your last {scenario} recommendation.</span>
                            <button onClick={getRecommendation} className="text-gold hover:underline">Refresh</button>
                        </div>
                    )}

                    {isLoading && <LoadingSpinner message={LOADING_MESSAGES[Math.floor(Math.random() * LOADING_MESSAGES.length)]} />}
                    {error && <div className="bg-red-900/30 border border-red-700/50 rounded-lg p-4 text-red-400">{error}</div>}

                    {/* Results */}
                    {displayResult && (
                        <div className="space-y-4">
                            {/* Strategy Summary */}
                            <div className="bg-gradient-to-r from-gold/10 to-darkred/10 border border-gold/30 rounded-lg p-4">
                                <h3 className="font-cinzel text-gold mb-2">Strategy</h3>
                                <p className="text-gray-200">{displayResult.overall_strategy}</p>
                                {displayResult.element_notes && (
                                    <p className="text-sm text-gray-400 mt-2">🔮 {displayResult.element_notes}</p>
                                )}
                                {savedRec?.timestamp && !result && (
                                    <p className="text-xs text-gray-600 mt-2">Last updated: {new Date(savedRec.timestamp).toLocaleString()}</p>
                                )}
                            </div>

                            {/* Warnings */}
                            {displayResult.warnings?.length > 0 && (
                                <div className="bg-yellow-900/30 border border-yellow-700/50 rounded-lg p-4">
                                    <h4 className="font-cinzel text-yellow-400 mb-2">⚠️ Warnings</h4>
                                    <ul className="space-y-1">
                                        {displayResult.warnings.map((w, i) => (
                                            <li key={i} className="text-yellow-200 text-sm">• {w}</li>
                                        ))}
                                    </ul>
                                </div>
                            )}

                            {/* Turn Sequence */}
                            <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                                <h4 className="font-cinzel text-gold mb-3">Turn Sequence</h4>
                                <div className="space-y-2">
                                    {displayResult.turn_sequence?.map((step, i) => (
                                        <div key={i} className="flex items-start gap-3 bg-charcoal/50 rounded p-3">
                                            <div className="bg-gold/20 text-gold font-cinzel w-16 text-center py-1 rounded shrink-0">
                                                Turn {step.turn}
                                            </div>
                                            <div className="flex-1">
                                                <div className="text-white font-medium">{step.action}</div>
                                                <div className="text-gray-400 text-sm">{step.rationale}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Recommended Loadout */}
                            <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">

                                        <div key={i} className="bg-charcoal/50 rounded p-2">
                                            <div className="flex items-center justify-between mb-1">
                                                <span className="text-xs text-gray-600">Slot {slot.slot}</span>

                            {/* Alternatives */}

                                    <div className="space-y-2">
                                        {displayResult.alternative_skills.map((alt, i) => (
                                            <div key={i} className="flex items-center gap-2 text-sm">
                                                <span className="text-gold">{alt.skill_name}</span>
                                                <span className="text-gray-500">→</span>
                                                <span className="text-gray-400">{alt.use_case}</span>

                                </div>

                    {!displayResult && !isLoading && skillDatabase.length === 0 && (

                            <p className="text-lg mb-2">No skills in database</p>
                            <p className="text-sm">Upload skill screenshots in the Skills tab to get started.</p>
                        </div>

                </div>
            );
        };

        // ============ SKILLS TAB (SCREENSHOT INGESTION) ============
        const SkillsTab = () => {
            const { activeProfile, apiKey, addSkillsToDatabase } = useContext(AppContext);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');
            const [ingestionResult, setIngestionResult] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [roleFilter, setRoleFilter] = useState('All');
            const [selectedSkill, setSelectedSkill] = useState(null);
            const [showManualForm, setShowManualForm] = useState(false);
            const [manualSkill, setManualSkill] = useState({ name: '', role: 'Primary Damage', element: 'None', target: 'Single Enemy', turns_required: 1, notes: '' });
            const fileInputRef = useRef(null);

            const skillDatabase = activeProfile.skillDatabase || [];

            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                if (!apiKey) { setError('Please enter your API key in the Profile tab'); return; }

                setIsLoading(true);
                setError('');
                setIngestionResult(null);

                let totalNew = 0, totalUpdated = 0;
                const allExtracted = [];

                try {
                    for (const file of files) {
                        const base64 = await new Promise((resolve, reject) => {
                            const reader = new FileReader();
                            reader.onload = () => resolve(reader.result.split(',')[1]);
                            reader.onerror = reject;
                            reader.readAsDataURL(file);
                        });
                        const mediaType = file.type || 'image/png';

                        const response = await callClaudeVisionAPI(apiKey, base64, mediaType);
                        const textContent = response.content.find(c => c.type === 'text')?.text || '';
                        const jsonMatch = textContent.match(/\[[\s\S]*\]/);
                        if (jsonMatch) {
                            const skills = JSON.parse(jsonMatch[0]);
                            allExtracted.push(...skills);
                        }
                    }

                    // Count new vs updated
                    allExtracted.forEach(skill => {
                        const exists = skillDatabase.some(s => s.name.toLowerCase() === skill.name.toLowerCase());
                        if (exists) totalUpdated++;
                        else totalNew++;
                    });

                    addSkillsToDatabase(allExtracted);
                    setIngestionResult({ total: allExtracted.length, new: totalNew, updated: totalUpdated, skills: allExtracted });
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                    if (fileInputRef.current) fileInputRef.current.value = '';
                }
            };

            const handleManualAdd = () => {
                if (!manualSkill.name) return;
                addSkillsToDatabase([manualSkill]);
                setManualSkill({ name: '', role: 'Primary Damage', element: 'None', target: 'Single Enemy', turns_required: 1, notes: '' });
                setShowManualForm(false);
            };

            const filteredSkills = skillDatabase.filter(skill => {
                const matchesSearch = skill.name.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesRole = roleFilter === 'All' || skill.role === roleFilter;
                return matchesSearch && matchesRole;
            });

            const groupedSkills = SKILL_ROLES.reduce((acc, role) => {
                acc[role] = filteredSkills.filter(s => s.role === role);
                return acc;
            }, {});

            return (
                <div className="space-y-6 pb-20 md:pb-0">
                    <h2 className="font-cinzel text-xl text-gold">Skill Database</h2>

                    {/* Upload Section */}
                    <div className="bg-gradient-to-br from-slate/60 to-obsidian/80 border border-gold/30 rounded-lg p-4">
                        <h3 className="font-cinzel text-gold mb-3">Build Skill Database</h3>
                        <p className="text-sm text-gray-400 mb-4">Upload screenshots of your in-game skill list. The AI will extract and categorize each skill automatically.</p>

                        <div className="flex flex-col sm:flex-row gap-3">
                            <label className="flex-1 py-3 bg-gold/20 text-gold rounded text-center cursor-pointer hover:bg-gold/30 transition-colors">
                                <input type="file" ref={fileInputRef} accept="image/*" multiple onChange={handleFileUpload} className="hidden" />
                                📷 Upload Screenshots
                            </label>
                            <button onClick={() => setShowManualForm(!showManualForm)}
                                className="py-3 px-4 bg-slate text-gray-300 rounded hover:bg-gray-700 transition-colors">
                                + Manual Add
                            </button>
                        </div>

                        {isLoading && <LoadingSpinner message="Extracting skills from screenshots..." />}
                        {error && <div className="mt-3 bg-red-900/30 border border-red-700/50 rounded p-3 text-red-400 text-sm">{error}</div>}

                        {ingestionResult && (
                            <div className="mt-4 bg-green-900/30 border border-green-700/50 rounded-lg p-3">
                                <p className="text-green-400 font-medium">Extracted {ingestionResult.total} skills. {ingestionResult.new} new, {ingestionResult.updated} updated.</p>
                                <details className="mt-2">
                                    <summary className="text-sm text-gray-400 cursor-pointer">View extracted skills</summary>
                                    <div className="mt-2 space-y-1 max-h-40 overflow-y-auto">
                                        {ingestionResult.skills.map((skill, i) => (
                                            <div key={i} className="flex items-center justify-between text-sm py-1">
                                                <span className="text-white">{skill.name}</span>
                                                <RoleBadge role={skill.role} />
                                            </div>
                                        ))}
                                    </div>
                                </details>
                            </div>
                        )}
                    </div>

                    {/* Manual Add Form */}
                    {showManualForm && (
                        <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                            <h4 className="font-cinzel text-gold mb-3">Quick Manual Add</h4>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                <div className="col-span-2 md:col-span-1">
                                    <label className="block text-xs text-gray-500 mb-1">Skill Name *</label>
                                    <input type="text" value={manualSkill.name} onChange={(e) => setManualSkill(prev => ({ ...prev, name: e.target.value }))}
                                        className="w-full bg-charcoal border border-gray-700 rounded px-3 py-2 text-sm" />
                                </div>
                                <div>

        // ============ LOADOUT TAB (GEAR ONLY) ============

                const current = activeProfile.loadout[slotKey];

        // ============ GEAR TAB (UNCHANGED) ============
        const GearTab = () => {
            const { activeProfile, apiKey, addEvaluation, evaluationHistory, activeProfileId } = useContext(AppContext);
            const [gear, setGear] = useState({ ...EMPTY_GEAR });
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');
            const [result, setResult] = useState(null);
            const [tokenInfo, setTokenInfo] = useState(null);

            const getSlotKey = (slot) => {
                const map = { 'Weapon': 'weapon', 'Off-hand': 'offhand', 'Head': 'head', 'Torso': 'torso', 'Legs': 'legs', 'Accessory': 'accessory1' };
                return map[slot] || 'weapon';
            };

            const evaluateGear = async () => {
                if (!apiKey) { setError('Please enter your API key in the Profile tab'); return; }
                setIsLoading(true);
                setError('');
                setResult(null);
                setTokenInfo(null);

                try {
                    const slotKey = getSlotKey(gear.slot);
                    const currentItem = activeProfile.loadout[slotKey];
                    const prompt = buildCompactPrompt(activeProfile, gear.slot, currentItem, gear);
                    const inputTokens = estimateTokens(prompt);

                    const response = await callClaudeAPI(apiKey, prompt);
                    const textContent = response.content.find(c => c.type === 'text')?.text || '';
                    const outputTokens = estimateTokens(textContent);

                    setTokenInfo({ input: inputTokens, output: outputTokens, cost: estimateCost(inputTokens, outputTokens) });

                    const jsonMatch = textContent.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        const parsed = JSON.parse(jsonMatch[0]);
                        setResult({ ...parsed, item_name: gear.name });
                        addEvaluation({ type: 'gear', item_name: gear.name, ...parsed });
                    } else {
                        setResult({ verdict: 'Unknown', color: 'yellow', reason: textContent });
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

                                <div className="text-xs text-gray-500 border-t border-gray-700 pt-2 mt-2">

            const { activeProfile, updateProfile, apiKey } = useContext(AppContext);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');
            const [metaResults, setMetaResults] = useState(null);

            const lastUpdate = activeProfile.lastMetaUpdate ? new Date(activeProfile.lastMetaUpdate) : null;
            const daysSinceUpdate = lastUpdate ? Math.floor((Date.now() - lastUpdate) / (1000 * 60 * 60 * 24)) : null;

            const refreshMeta = async () => {
                if (!apiKey) { setError('Please enter your API key in the Profile tab'); return; }
                setIsLoading(true);
                setError('');

                try {
                    const query = `Search for: ${activeProfile.game} ${activeProfile.classSpec} T${activeProfile.tier} ${activeProfile.playstyle} build guide patch notes 2024 2025 2026. Check: blog.ornarpg.com, r/OrnaRPG, playorna.com/releases. Return: recent changes, tier list position, recommended gear/skills, any balance changes.`;
                    const response = await callClaudeAPI(apiKey, query, true);

                    let text = '';
                    for (const block of response.content) {
                        if (block.type === 'text') text += block.text;
                    }

                    setMetaResults(text);
                    updateProfile({ metaNotes: text, lastMetaUpdate: new Date().toISOString() });
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="space-y-6 pb-20 md:pb-0">
                    <div className="flex justify-between items-center">
                        <h2 className="font-cinzel text-xl text-gold">Meta Refresh</h2>
                        <button onClick={refreshMeta} disabled={isLoading}
                            className="px-4 py-2 bg-gold/20 text-gold rounded hover:bg-gold/30 disabled:opacity-50">
                            {isLoading ? 'Searching...' : 'Refresh Meta'}
                        </button>
                    </div>

                    {(daysSinceUpdate === null || daysSinceUpdate > 21) && (
                        <div className="bg-yellow-900/30 border border-yellow-700/50 rounded-lg p-3 text-yellow-400 text-sm">
                            Meta data is {daysSinceUpdate === null ? 'not available' : `${daysSinceUpdate} days old`}. Consider refreshing.
                        </div>
                    )}

                    <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                        <div className="grid grid-cols-2 gap-3 text-sm">
                            <div><span className="text-gray-500">Class:</span> {activeProfile.classSpec}</div>
                            <div><span className="text-gray-500">Target:</span> {activeProfile.endgameTarget}</div>
                            <div><span className="text-gray-500">Playstyle:</span> {activeProfile.playstyle}</div>
                            <div><span className="text-gray-500">Last update:</span> {lastUpdate?.toLocaleDateString() || 'Never'}</div>
                        </div>
                    </div>

                    {isLoading && <LoadingSpinner message="Searching the meta..." />}
                    {error && <div className="bg-red-900/30 border border-red-700/50 rounded-lg p-4 text-red-400">{error}</div>}

                    {(metaResults || activeProfile.metaNotes) && (
                        <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                            <h3 className="font-cinzel text-gold mb-3">Latest Meta</h3>
                            <div className="whitespace-pre-wrap text-sm text-gray-300">{metaResults || activeProfile.metaNotes}</div>
                        </div>
                    )}

                    <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                        <h3 className="font-cinzel text-gold mb-3">Resources</h3>
                        <div className="grid grid-cols-2 gap-2 text-sm">
                            {['blog.ornarpg.com', 'playorna.com/releases', 'reddit.com/r/OrnaRPG', 'reddit.com/r/HeroOfAethric'].map(url => (
                                <a key={url} href={`https://${url}`} target="_blank" rel="noopener" className="text-gray-400 hover:text-gold">🔗 {url}</a>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // ============ MAIN APP ============
        const App = () => {
            const { activeTab } = useContext(AppContext);

            const renderTab = () => {
                switch (activeTab) {
                    case 'advisor': return <AdvisorTab />;
                    case 'skills': return <SkillsTab />;
                    case 'loadout': return <LoadoutTab />;
                    case 'gear': return <GearTab />;
                    case 'profile': return <ProfileTab />;
                    case 'meta': return <MetaTab />;
                    default: return <AdvisorTab />;
                }
            };

            return (
                <div className="min-h-screen bg-charcoal pb-20 md:pb-0">
                    <Header />
                    <TabNav />
                    <main className="max-w-6xl mx-auto px-4 py-6">{renderTab()}</main>
                </div>
            );
        };

        // ============ RENDER ============
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <PasswordGate>
                <AppProvider>
                    <App />
                </AppProvider>
            </PasswordGate>
        );
    </script>
</body>
</html>
