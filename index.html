<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AethricAdvisor - Build Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        charcoal: '#1a1a1a',
                        darkred: '#8B0000',
                        gold: '#DAA520',
                        darkgold: '#B8860B',
                        ember: '#CD5C5C',
                        slate: '#2d2d2d',
                        obsidian: '#0d0d0d'
                    },
                    fontFamily: {
                        cinzel: ['Cinzel', 'serif'],
                        inter: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #1a1a1a; }
        .scrollbar-dark::-webkit-scrollbar { width: 8px; }
        .scrollbar-dark::-webkit-scrollbar-track { background: #2d2d2d; }
        .scrollbar-dark::-webkit-scrollbar-thumb { background: #8B0000; border-radius: 4px; }
        .glow-gold { box-shadow: 0 0 10px rgba(218, 165, 32, 0.3); }
        .glow-red { box-shadow: 0 0 10px rgba(139, 0, 0, 0.5); }
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-slow { animation: pulse-slow 2s ease-in-out infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); } 20%, 40%, 60%, 80% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-charcoal text-white font-inter min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useContext, createContext, useRef, useCallback } = React;

        // ============ BUILD INFO ============
        const BUILD_TIMESTAMP = '2025-03-17T04:35:00Z';

        // ============ PASSWORD ============
        const APP_PASSWORD = 'AethricApp!984';
        const SESSION_AUTH_KEY = 'aethric_authenticated';

        // ============ CONSTANTS ============
        const FACTIONS = {
            'Knights of Inferno': { emoji: '🔥', element: 'Fire', bonus: '+25% fire, -20% fire taken' },
            'Earthen Legion': { emoji: '🌍', element: 'Earth', bonus: '+25% earth, -20% earth taken' },
            'Stormforce': { emoji: '⚡', element: 'Lightning', bonus: '+25% lightning, -20% lightning taken' },
            'Frozenguard': { emoji: '❄️', element: 'Ice', bonus: '+25% ice, -20% ice taken' }
        };

        const GAMES = ['Hero of Aethric', 'Orna: The GPS RPG'];
        const PLAYSTYLES = ['Physical DPS', 'Tank', 'Mage DPS', 'Hybrid', 'Endgame Raid'];
        const QUALITIES = ['Broken', 'Poor', 'Common', 'Superior', 'Famed', 'Legendary', 'Ornate'];
        const TIERS = ['T1', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'T8', 'T9', 'T10'];
        const SLOTS = ['Weapon', 'Off-hand', 'Head', 'Torso', 'Legs', 'Accessory'];
        const SLOT_KEYS = ['weapon', 'offhand', 'head', 'torso', 'legs', 'accessory1', 'accessory2'];
        const USEABLE_BY = ['All Classes', 'Warrior Classes', 'Mage Classes', 'Thief Classes', 'Melee Classes'];
        const ELEMENTS = ['None', 'Fire', 'Water', 'Ice', 'Lightning', 'Earth', 'Holy', 'Dark', 'Arcane'];
        const SKILL_TYPES = ['Active Skill', 'Passive Ability', 'Spell', 'Ward Skill', 'Buff', 'Debuff', 'Cleanse', 'Multi-hit'];
        const SKILL_ELEMENTS = ['None', 'Fire', 'Ice', 'Lightning', 'Earth', 'Holy', 'Dark', 'Arcane', 'Non-elemental', 'Physical'];
        const SPECIAL_PROPERTIES = [
            'Causes Bleeding', 'Causes Poison', 'Causes Stun', 'Causes Blind', 'Causes Blight',
            'Gives Att↑', 'Gives Def↑', 'Gives Mag↑', 'Gives Ward↑', 'Gold Bonus', 'Orn Bonus'
        ];
        const STATS = ['attack', 'defense', 'resistance', 'hp', 'mana', 'ward', 'magic', 'dexterity', 'foresight', 'crit'];
        const STAT_LABELS = { attack: 'Attack', defense: 'Defense', resistance: 'Resistance', hp: 'HP', mana: 'Mana', ward: 'Ward%', magic: 'Magic', dexterity: 'Dexterity', foresight: 'Foresight', crit: 'Crit%' };

        const LOADING_MESSAGES = ["Consulting the Codex...", "Analyzing the runes...", "Comparing stats..."];

        const EMPTY_GEAR = {
            name: '', quality: 'Legendary', tier: 'T7', level: '', slot: 'Weapon', useableBy: 'All Classes',
            element: 'None', abilityName: '', abilityDesc: '',
            stats: { attack: 0, defense: 0, resistance: 0, hp: 0, mana: 0, ward: 0, magic: 0, dexterity: 0, foresight: 0, crit: 0 },
            statMods: { attack: '+', defense: '+', resistance: '+', hp: '+', mana: '+', ward: '+', magic: '+', dexterity: '+', foresight: '+', crit: '+' },
            specialProperties: [], materials: '', notes: ''
        };

        const EMPTY_SKILL = {
            name: '', type: 'Spell', element: 'Fire', manaCost: 0, powerMin: 0, powerMax: 0, hitCount: 1,
            effect: '', sourceClass: '', notes: ''
        };

        // ============ DEFAULT PROFILES ============
        const createDefaultLoadout = () => ({
            head: null, torso: null, legs: null, weapon: null, offhand: null, accessory1: null, accessory2: null,
            skills: Array(12).fill(null)
        });

        const DEFAULT_PROFILES = [
            {
                id: 'biffius-default',
                name: 'Biffius',
                game: 'Hero of Aethric',
                classSpec: 'Paladin · Inquisitor',
                tier: 7,
                level: 150,
                faction: 'Knights of Inferno',
                playstyle: 'Endgame Raid',
                endgameTarget: 'Gilgamesh (Spiked Shield)',
                knownWeaknesses: 'Resistance critically low at 148. Prioritise Res over Def for head/torso.',
                currentStats: { hp: 4452, ward: 3005, attack: 1086, defense: 1689, resistance: 148, dexterity: 148, foresight: 340, crit: 5 },
                loadout: createDefaultLoadout(),
                ornsAvailable: 0,
                metaNotes: '',
                lastMetaUpdate: null
            },
            {
                id: 'spiffius-default',
                name: 'Spiffius',
                game: 'Orna: The GPS RPG',
                classSpec: 'Archduid · Magus',
                tier: 7,
                level: 158,
                faction: 'Knights of Inferno',
                playstyle: 'Mage DPS',
                endgameTarget: 'Omnimancer',
                knownWeaknesses: 'Accessories undertiered at T4. Mana management on long dungeon floors.',
                currentStats: { hp: 0, ward: 0, attack: 0, defense: 0, resistance: 0, dexterity: 0, foresight: 0, crit: 0, mana: 0, magic: 0 },
                loadout: createDefaultLoadout(),
                ornsAvailable: 723055,
                metaNotes: '',
                lastMetaUpdate: null
            }
        ];

        // ============ CONTEXT ============
        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [profiles, setProfiles] = useState(() => {
                const saved = localStorage.getItem('aethric_profiles_v2');
                return saved ? JSON.parse(saved) : DEFAULT_PROFILES;
            });
            const [activeProfileId, setActiveProfileId] = useState(() => {
                return localStorage.getItem('aethric_active_profile') || DEFAULT_PROFILES[0].id;
            });
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('aethric_api_key') || '');
            const [evaluationHistory, setEvaluationHistory] = useState(() => {
                const saved = localStorage.getItem('aethric_eval_history_v2');
                return saved ? JSON.parse(saved) : {};
            });
            const [activeTab, setActiveTab] = useState('profile');

            useEffect(() => { localStorage.setItem('aethric_profiles_v2', JSON.stringify(profiles)); }, [profiles]);
            useEffect(() => { localStorage.setItem('aethric_active_profile', activeProfileId); }, [activeProfileId]);
            useEffect(() => { localStorage.setItem('aethric_api_key', apiKey); }, [apiKey]);
            useEffect(() => { localStorage.setItem('aethric_eval_history_v2', JSON.stringify(evaluationHistory)); }, [evaluationHistory]);

            const activeProfile = profiles.find(p => p.id === activeProfileId) || profiles[0];

            const updateProfile = (updates) => {
                setProfiles(prev => prev.map(p => p.id === activeProfileId ? { ...p, ...updates } : p));
            };

            const updateLoadout = (slotKey, item) => {
                setProfiles(prev => prev.map(p => {
                    if (p.id !== activeProfileId) return p;
                    return { ...p, loadout: { ...p.loadout, [slotKey]: item } };
                }));
            };

            const updateSkillSlot = (index, skill) => {
                setProfiles(prev => prev.map(p => {
                    if (p.id !== activeProfileId) return p;
                    const skills = [...p.loadout.skills];
                    skills[index] = skill;
                    return { ...p, loadout: { ...p.loadout, skills } };
                }));
            };

            const addEvaluation = (evaluation) => {
                setEvaluationHistory(prev => {
                    const profileHistory = prev[activeProfileId] || [];
                    const updated = [{ ...evaluation, timestamp: new Date().toISOString() }, ...profileHistory].slice(0, 10);
                    return { ...prev, [activeProfileId]: updated };
                });
            };

            const addProfile = (profile) => {
                const newProfile = { ...DEFAULT_PROFILES[0], ...profile, id: `profile-${Date.now()}`, loadout: createDefaultLoadout() };
                setProfiles(prev => [...prev, newProfile]);
                setActiveProfileId(newProfile.id);
            };

            const deleteProfile = (id) => {
                if (profiles.length <= 1) return;
                setProfiles(prev => prev.filter(p => p.id !== id));
                if (activeProfileId === id) setActiveProfileId(profiles.find(p => p.id !== id)?.id);
            };

            return (
                <AppContext.Provider value={{
                    profiles, activeProfile, activeProfileId, setActiveProfileId, updateProfile,
                    updateLoadout, updateSkillSlot, apiKey, setApiKey, evaluationHistory, addEvaluation,
                    activeTab, setActiveTab, addProfile, deleteProfile
                }}>
                    {children}
                </AppContext.Provider>
            );
        };

        // ============ API SERVICE ============
        const estimateTokens = (text) => Math.ceil(text.length / 4);
        const estimateCost = (inputTokens, outputTokens) => {
            const inputCost = (inputTokens / 1000000) * 3;
            const outputCost = (outputTokens / 1000000) * 15;
            return (inputCost + outputCost).toFixed(4);
        };

        const buildCompactPrompt = (profile, slot, currentItem, newItem) => {
            const faction = FACTIONS[profile.faction];
            return `Gear advisor for ${profile.game}. Evaluate for: ${profile.classSpec}, ${profile.playstyle}, T${profile.tier}.
Faction: ${profile.faction} (${faction?.bonus}).
CRITICAL: ${profile.knownWeaknesses}
Current ${slot}: ${currentItem ? JSON.stringify(currentItem) : 'Empty'}
New item: ${JSON.stringify(newItem)}
Return JSON only: {"verdict":"Upgrade|Sidegrade|Downgrade|Skip","color":"green|yellow|red","reason":"<50 words","flags":["array"],"priority":1-5}`;
        };

        const buildSkillPrompt = (profile, currentSkills, newSkill) => {
            const faction = FACTIONS[profile.faction];
            const elements = currentSkills.filter(s => s).map(s => s.element).filter(e => e && e !== 'None');
            return `Skill advisor for ${profile.game}. Evaluate for: ${profile.classSpec}, ${profile.playstyle}.
Faction: ${profile.faction} (${faction?.element} bonus).
Current elements: [${elements.join(',')}]
New skill: ${JSON.stringify(newSkill)}
Return JSON only: {"verdict":"Must Have|Strong|Situational|Skip","color":"green|yellow|red","reason":"<50 words","rotation":"when to use","replaces":"skill name or none","priority":1-5}`;
        };

        const callClaudeAPI = async (apiKey, prompt, useWebSearch = false) => {
            const tools = useWebSearch ? [{ type: "web_search_20250305", name: "web_search", max_uses: 5 }] : undefined;
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 500,
                    messages: [{ role: 'user', content: prompt }],
                    ...(tools && { tools })
                })
            });
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API request failed');
            }
            return response.json();
        };

        // ============ COMPONENTS ============

        // Password Gate
        const PasswordGate = ({ children }) => {
            const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem(SESSION_AUTH_KEY) === 'true');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [isShaking, setIsShaking] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (password === APP_PASSWORD) {
                    sessionStorage.setItem(SESSION_AUTH_KEY, 'true');
                    setIsAuthenticated(true);
                } else {
                    setError('Incorrect password');
                    setIsShaking(true);
                    setTimeout(() => setIsShaking(false), 500);
                    setPassword('');
                }
            };

            if (isAuthenticated) return children;

            return (
                <div className="fixed inset-0 bg-obsidian flex items-center justify-center z-[9999]">
                    <div className={`bg-charcoal border-2 border-darkred/50 rounded-lg p-8 max-w-md w-full mx-4 ${isShaking ? 'animate-shake' : ''}`}>
                        <div className="text-center mb-8">
                            <h1 className="font-cinzel text-3xl text-gold mb-2">AethricAdvisor</h1>
                            <p className="text-gray-400 text-sm">Enter password to access</p>
                        </div>
                        <form onSubmit={handleSubmit}>
                            <input type="password" value={password} onChange={(e) => { setPassword(e.target.value); setError(''); }}
                                placeholder="Password..." autoFocus
                                className="w-full bg-slate border border-gray-700 rounded-lg px-4 py-3 text-center mb-4 focus:outline-none focus:border-gold" />
                            {error && <div className="mb-4 p-3 bg-red-900/30 border border-red-700/50 rounded text-red-400 text-sm text-center">{error}</div>}
                            <button type="submit" className="w-full py-3 bg-darkred/70 hover:bg-darkred text-white font-cinzel rounded-lg">Enter</button>
                        </form>
                    </div>
                </div>
            );
        };

        // Header
        const Header = () => {
            const { activeProfile, profiles, activeProfileId, setActiveProfileId } = useContext(AppContext);
            const faction = FACTIONS[activeProfile.faction];
            const buildDate = new Date(BUILD_TIMESTAMP);
            const buildStr = buildDate.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
            return (
                <header className="bg-obsidian border-b border-darkred/50 sticky top-0 z-50">
                    <div className="max-w-6xl mx-auto px-4 py-3">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <h1 className="font-cinzel text-xl md:text-2xl text-gold">AethricAdvisor</h1>
                                <span className="text-[10px] text-gray-600 hidden sm:inline" title={BUILD_TIMESTAMP}>v{buildStr}</span>
                            </div>
                            <select value={activeProfileId} onChange={(e) => setActiveProfileId(e.target.value)}
                                className="bg-slate border border-darkred/50 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-gold">
                                {profiles.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                            </select>
                        </div>
                        <div className="mt-2 flex items-center justify-between text-sm">
                            <div className="flex items-center gap-2">
                                <span className="text-2xl">{faction?.emoji}</span>
                                <span className="text-gold font-cinzel">{activeProfile.name}</span>
                                <span className="text-gray-400">·</span>
                                <span className="text-gray-300">{activeProfile.classSpec}</span>
                                <span className="bg-darkred/50 px-2 py-0.5 rounded text-xs">T{activeProfile.tier}</span>
                            </div>
                            <span className="text-[10px] text-gray-600 sm:hidden" title={BUILD_TIMESTAMP}>v{buildStr}</span>
                        </div>
                    </div>
                </header>
            );
        };

        // Tab Navigation
        const TabNav = () => {
            const { activeTab, setActiveTab } = useContext(AppContext);
            const tabs = [
                { id: 'profile', label: 'Profile', icon: '👤' },
                { id: 'loadout', label: 'Loadout', icon: '🎒' },
                { id: 'gear', label: 'Gear', icon: '⚔️' },
                { id: 'skills', label: 'Skills', icon: '✨' },
                { id: 'meta', label: 'Meta', icon: '📊' }
            ];
            return (
                <>
                    <nav className="hidden md:block bg-slate border-b border-darkred/30 sticky top-[72px] z-40">
                        <div className="max-w-6xl mx-auto px-4 flex">
                            {tabs.map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                    className={`px-4 py-3 text-sm font-medium ${activeTab === tab.id ? 'text-gold border-b-2 border-gold' : 'text-gray-400 hover:text-white'}`}>
                                    {tab.label}
                                </button>
                            ))}
                        </div>
                    </nav>
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-obsidian border-t border-darkred/50 z-40">
                        <div className="flex justify-around">
                            {tabs.map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                    className={`flex-1 py-3 flex flex-col items-center gap-1 ${activeTab === tab.id ? 'text-gold' : 'text-gray-500'}`}>
                                    <span className="text-lg">{tab.icon}</span>
                                    <span className="text-xs">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                </>
            );
        };

        // Utility Components
        const LoadingSpinner = ({ message }) => (
            <div className="flex items-center gap-3 p-4 bg-slate/50 rounded-lg">
                <div className="w-5 h-5 border-2 border-gold border-t-transparent rounded-full animate-spin"></div>
                <span className="text-gold animate-pulse-slow">{message || LOADING_MESSAGES[Math.floor(Math.random() * LOADING_MESSAGES.length)]}</span>
            </div>
        );

        const VerdictBadge = ({ verdict, color }) => {
            const colors = { green: 'bg-green-900/50 text-green-400 border-green-700', yellow: 'bg-yellow-900/50 text-yellow-400 border-yellow-700', red: 'bg-red-900/50 text-red-400 border-red-700' };
            return <span className={`px-3 py-1 rounded border text-sm ${colors[color] || colors.yellow}`}>{verdict}</span>;
        };

        const CopyButton = ({ text }) => {
            const [copied, setCopied] = useState(false);
            const handleCopy = async () => { await navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 2000); };
            return <button onClick={handleCopy} className={`px-2 py-1 text-xs rounded ${copied ? 'bg-green-900/50 text-green-400' : 'bg-slate text-gray-400 hover:bg-gray-700'}`}>{copied ? '✓' : '📋'}</button>;
        };

        // ============ GEAR FORM ============
        const GearForm = ({ gear, setGear, onSubmit, submitLabel = 'Evaluate', isLoading = false }) => {
            const updateStat = (stat, value) => setGear(prev => ({ ...prev, stats: { ...prev.stats, [stat]: parseInt(value) || 0 } }));
            const updateMod = (stat, mod) => setGear(prev => ({ ...prev, statMods: { ...prev.statMods, [stat]: mod } }));
            const toggleProperty = (prop) => {
                setGear(prev => ({
                    ...prev,
                    specialProperties: prev.specialProperties.includes(prop)
                        ? prev.specialProperties.filter(p => p !== prop)
                        : [...prev.specialProperties, prop]
                }));
            };

            return (
                <div className="space-y-4">
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div className="col-span-2">
                            <label className="block text-xs text-gray-500 mb-1">Item Name</label>
                            <input type="text" value={gear.name} onChange={(e) => setGear(prev => ({ ...prev, name: e.target.value }))}
                                className="w-full bg-charcoal border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-gold" />
                        </div>
                        <div>
                            <label className="block text-xs text-gray-500 mb-1">Quality</label>
                            <select value={gear.quality} onChange={(e) => setGear(prev => ({ ...prev, quality: e.target.value }))}
                                className="w-full bg-charcoal border border-gray-700 rounded px-2 py-2 text-sm">
                                {QUALITIES.map(q => <option key={q}>{q}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="block text-xs text-gray-500 mb-1">Tier</label>
                            <select value={gear.tier} onChange={(e) => setGear(prev => ({ ...prev, tier: e.target.value }))}
                                className="w-full bg-charcoal border border-gray-700 rounded px-2 py-2 text-sm">
                                {TIERS.map(t => <option key={t}>{t}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div>
                            <label className="block text-xs text-gray-500 mb-1">Level (1-10)</label>
                            <input type="number" inputMode="numeric" min="1" max="10" step="1" value={gear.level}
                                onChange={(e) => setGear(prev => ({ ...prev, level: e.target.value === '' ? '' : parseInt(e.target.value) }))}
                                placeholder="1-10"
                                className={`w-full bg-charcoal border rounded px-2 py-2 text-sm ${gear.level !== '' && (gear.level < 1 || gear.level > 10) ? 'border-red-500' : 'border-gray-700'}`} />
                            {gear.level !== '' && (gear.level < 1 || gear.level > 10) && (
                                <p className="text-red-400 text-xs mt-1">Level must be between 1 and 10</p>
                            )}
                        </div>
                        <div>
                            <label className="block text-xs text-gray-500 mb-1">Slot</label>
                            <select value={gear.slot} onChange={(e) => setGear(prev => ({ ...prev, slot: e.target.value }))}
                                className="w-full bg-charcoal border border-gray-700 rounded px-2 py-2 text-sm">
                                {SLOTS.map(s => <option key={s}>{s}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="block text-xs text-gray-500 mb-1">Useable By</label>
                            <select value={gear.useableBy} onChange={(e) => setGear(prev => ({ ...prev, useableBy: e.target.value }))}
                                className="w-full bg-charcoal border border-gray-700 rounded px-2 py-2 text-sm">
                                {USEABLE_BY.map(u => <option key={u}>{u}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="block text-xs text-gray-500 mb-1">Element</label>
                            <select value={gear.element} onChange={(e) => setGear(prev => ({ ...prev, element: e.target.value }))}
                                className="w-full bg-charcoal border border-gray-700 rounded px-2 py-2 text-sm">
                                {ELEMENTS.map(e => <option key={e}>{e}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                        <div>
                            <label className="block text-xs text-gray-500 mb-1">Ability Name</label>
                            <input type="text" value={gear.abilityName} onChange={(e) => setGear(prev => ({ ...prev, abilityName: e.target.value }))}
                                placeholder="Optional" className="w-full bg-charcoal border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-gold" />
                        </div>
                        <div>

            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');
            const [result, setResult] = useState(null);
            const [tokenInfo, setTokenInfo] = useState(null);

            const getSlotKey = (slot) => {
                const map = { 'Weapon': 'weapon', 'Off-hand': 'offhand', 'Head': 'head', 'Torso': 'torso', 'Legs': 'legs', 'Accessory': 'accessory1' };
                return map[slot] || 'weapon';
            };

            const evaluateGear = async () => {
                if (!apiKey) { setError('Please enter your API key in the Profile tab'); return; }
                setIsLoading(true);
                setError('');
                setResult(null);
                setTokenInfo(null);

                try {
                    const slotKey = getSlotKey(gear.slot);
                    const currentItem = activeProfile.loadout[slotKey];
                    const prompt = buildCompactPrompt(activeProfile, gear.slot, currentItem, gear);
                    const inputTokens = estimateTokens(prompt);

                    const response = await callClaudeAPI(apiKey, prompt);
                    const textContent = response.content.find(c => c.type === 'text')?.text || '';
                    const outputTokens = estimateTokens(textContent);

                    setTokenInfo({ input: inputTokens, output: outputTokens, cost: estimateCost(inputTokens, outputTokens) });

                    const jsonMatch = textContent.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        const parsed = JSON.parse(jsonMatch[0]);
                        setResult({ ...parsed, item_name: gear.name });
                        addEvaluation({ type: 'gear', item_name: gear.name, ...parsed });
                    } else {
                        setResult({ verdict: 'Unknown', color: 'yellow', reason: textContent });
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const profileHistory = evaluationHistory[activeProfileId]?.filter(e => e.type === 'gear') || [];

                    </div>

                    {isLoading && <LoadingSpinner />}
                    {error && <div className="bg-red-900/30 border border-red-700/50 rounded-lg p-4 text-red-400">{error}</div>}

                    {result && (
                        <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4 space-y-3">
                            <div className="flex items-center justify-between flex-wrap gap-2">
                                <h3 className="font-cinzel text-lg text-gold">{result.item_name}</h3>
                                <div className="flex items-center gap-2">
                                    <CopyButton text={`${result.item_name}\nVerdict: ${result.verdict}\n${result.reason}${result.flags?.length ? '\nFlags: ' + result.flags.join(', ') : ''}`} />
                                    <VerdictBadge verdict={result.verdict} color={result.color} />
                                </div>
                            </div>
                            {result.flags?.length > 0 && (
                                <div className="flex flex-wrap gap-2">
                                    {result.flags.map((flag, i) => <span key={i} className="px-2 py-1 bg-darkred/30 text-xs rounded">{flag}</span>)}
                                </div>
                            )}
                            <p className="text-sm text-gray-300">{result.reason}</p>
                            {result.priority && (
                                <div className="flex items-center gap-2">
                                    <span className="text-xs text-gray-500">Priority:</span>
                                    {[1,2,3,4,5].map(n => <span key={n} className={`w-3 h-3 rounded ${n <= result.priority ? 'bg-gold' : 'bg-gray-700'}`}></span>)}
                                </div>
                            )}
                            {tokenInfo && (
                                <div className="text-xs text-gray-500 border-t border-gray-700 pt-2 mt-2">
                                    Tokens: ~{tokenInfo.input} in / ~{tokenInfo.output} out | Est. cost: ${tokenInfo.cost}
                                </div>
                            )}
                        </div>
                    )}

                    {profileHistory.length > 0 && (
                        <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                            <h3 className="font-cinzel text-gold mb-3">Recent Evaluations</h3>
                            <div className="space-y-2">
                                {profileHistory.slice(0, 5).map((ev, i) => (
                                    <div key={i} className="flex items-center justify-between text-sm bg-charcoal rounded p-2">
                                        <span className="truncate">{ev.item_name}</span>
                                        <VerdictBadge verdict={ev.verdict} color={ev.color} />
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============ SKILLS TAB ============
        const SkillsTab = () => {
            const { activeProfile, apiKey, addEvaluation, evaluationHistory, activeProfileId } = useContext(AppContext);
            const [skill, setSkill] = useState({ ...EMPTY_SKILL });
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');
            const [result, setResult] = useState(null);
            const [tokenInfo, setTokenInfo] = useState(null);

            const evaluateSkill = async () => {
                if (!apiKey) { setError('Please enter your API key in the Profile tab'); return; }
                setIsLoading(true);
                setError('');
                setResult(null);
                setTokenInfo(null);

                try {
                    const prompt = buildSkillPrompt(activeProfile, activeProfile.loadout.skills, skill);
                    const inputTokens = estimateTokens(prompt);

                    const response = await callClaudeAPI(apiKey, prompt);
                    const textContent = response.content.find(c => c.type === 'text')?.text || '';
                    const outputTokens = estimateTokens(textContent);

                    setTokenInfo({ input: inputTokens, output: outputTokens, cost: estimateCost(inputTokens, outputTokens) });

                    const jsonMatch = textContent.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        const parsed = JSON.parse(jsonMatch[0]);
                        setResult({ ...parsed, skill_name: skill.name });
                        addEvaluation({ type: 'skill', skill_name: skill.name, ...parsed });
                    } else {
                        setResult({ verdict: 'Unknown', color: 'yellow', reason: textContent });
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const profileHistory = evaluationHistory[activeProfileId]?.filter(e => e.type === 'skill') || [];

            return (
                <div className="space-y-6 pb-20 md:pb-0">
                    <h2 className="font-cinzel text-xl text-gold">Skill / Spell Evaluator</h2>
                    <p className="text-sm text-gray-400">Enter skill details to evaluate against your current loadout and elemental coverage.</p>

                    <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                        <SkillForm skill={skill} setSkill={setSkill} onSubmit={evaluateSkill} isLoading={isLoading} />
                    </div>

                    {isLoading && <LoadingSpinner />}
                    {error && <div className="bg-red-900/30 border border-red-700/50 rounded-lg p-4 text-red-400">{error}</div>}

                    {result && (
                        <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4 space-y-3">
                            <div className="flex items-center justify-between flex-wrap gap-2">
                                <h3 className="font-cinzel text-lg text-gold">{result.skill_name}</h3>
                                <div className="flex items-center gap-2">
                                    <CopyButton text={`${result.skill_name}\nVerdict: ${result.verdict}\n${result.reason}${result.rotation ? '\nRotation: ' + result.rotation : ''}${result.replaces ? '\nReplaces: ' + result.replaces : ''}`} />
                                    <VerdictBadge verdict={result.verdict} color={result.color} />
                                </div>
                            </div>
                            <p className="text-sm text-gray-300">{result.reason}</p>
                            {result.rotation && <p className="text-sm text-gray-400"><span className="text-gray-500">Rotation:</span> {result.rotation}</p>}
                            {result.replaces && <p className="text-sm text-gray-400"><span className="text-gray-500">Replaces:</span> {result.replaces}</p>}
                            {result.priority && (
                                <div className="flex items-center gap-2">
                                    <span className="text-xs text-gray-500">Priority:</span>
                                    {[1,2,3,4,5].map(n => <span key={n} className={`w-3 h-3 rounded ${n <= result.priority ? 'bg-gold' : 'bg-gray-700'}`}></span>)}
                                </div>
                            )}
                            {tokenInfo && (
                                <div className="text-xs text-gray-500 border-t border-gray-700 pt-2 mt-2">
                                    Tokens: ~{tokenInfo.input} in / ~{tokenInfo.output} out | Est. cost: ${tokenInfo.cost}
                                </div>
                            )}
                        </div>
                    )}

                    {profileHistory.length > 0 && (
                        <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                            <h3 className="font-cinzel text-gold mb-3">Recent Evaluations</h3>
                            <div className="space-y-2">
                                {profileHistory.slice(0, 5).map((ev, i) => (
                                    <div key={i} className="flex items-center justify-between text-sm bg-charcoal rounded p-2">
                                        <span className="truncate">{ev.skill_name}</span>
                                        <VerdictBadge verdict={ev.verdict} color={ev.color} />
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============ META TAB ============
        const MetaTab = () => {
            const { activeProfile, updateProfile, apiKey } = useContext(AppContext);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');
            const [metaResults, setMetaResults] = useState(null);

            const lastUpdate = activeProfile.lastMetaUpdate ? new Date(activeProfile.lastMetaUpdate) : null;
            const daysSinceUpdate = lastUpdate ? Math.floor((Date.now() - lastUpdate) / (1000 * 60 * 60 * 24)) : null;

            const refreshMeta = async () => {
                if (!apiKey) { setError('Please enter your API key in the Profile tab'); return; }
                setIsLoading(true);
                setError('');

                try {
                    const query = `Search for: ${activeProfile.game} ${activeProfile.classSpec} T${activeProfile.tier} ${activeProfile.playstyle} build guide patch notes 2024 2025. Check: blog.ornarpg.com, r/OrnaRPG, playorna.com/releases. Return: recent changes, tier list position, recommended gear/skills.`;
                    const response = await callClaudeAPI(apiKey, query, true);

                    let text = '';
                    for (const block of response.content) {
                        if (block.type === 'text') text += block.text;
                    }

                    setMetaResults(text);
                    updateProfile({ metaNotes: text, lastMetaUpdate: new Date().toISOString() });
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="space-y-6 pb-20 md:pb-0">
                    <div className="flex justify-between items-center">
                        <h2 className="font-cinzel text-xl text-gold">Meta Refresh</h2>
                        <button onClick={refreshMeta} disabled={isLoading}
                            className="px-4 py-2 bg-gold/20 text-gold rounded hover:bg-gold/30 disabled:opacity-50">
                            {isLoading ? 'Searching...' : 'Refresh Meta'}
                        </button>
                    </div>

                    {(daysSinceUpdate === null || daysSinceUpdate > 21) && (
                        <div className="bg-yellow-900/30 border border-yellow-700/50 rounded-lg p-3 text-yellow-400 text-sm">
                            Meta data is {daysSinceUpdate === null ? 'not available' : `${daysSinceUpdate} days old`}. Consider refreshing.
                        </div>
                    )}

                    <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                        <div className="grid grid-cols-2 gap-3 text-sm">
                            <div><span className="text-gray-500">Class:</span> {activeProfile.classSpec}</div>
                            <div><span className="text-gray-500">Target:</span> {activeProfile.endgameTarget}</div>
                            <div><span className="text-gray-500">Playstyle:</span> {activeProfile.playstyle}</div>
                            <div><span className="text-gray-500">Last update:</span> {lastUpdate?.toLocaleDateString() || 'Never'}</div>
                        </div>
                    </div>

                    {isLoading && <LoadingSpinner message="Searching the meta..." />}
                    {error && <div className="bg-red-900/30 border border-red-700/50 rounded-lg p-4 text-red-400">{error}</div>}

                    {(metaResults || activeProfile.metaNotes) && (
                        <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                            <h3 className="font-cinzel text-gold mb-3">Latest Meta</h3>
                            <div className="whitespace-pre-wrap text-sm text-gray-300">{metaResults || activeProfile.metaNotes}</div>
                        </div>
                    )}

                    <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                        <h3 className="font-cinzel text-gold mb-3">Resources</h3>
                        <div className="grid grid-cols-2 gap-2 text-sm">
                            {['blog.ornarpg.com', 'playorna.com/releases', 'reddit.com/r/OrnaRPG', 'reddit.com/r/HeroOfAethric'].map(url => (
                                <a key={url} href={`https://${url}`} target="_blank" rel="noopener" className="text-gray-400 hover:text-gold">🔗 {url}</a>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // ============ MAIN APP ============
        const App = () => {
            const { activeTab } = useContext(AppContext);

            const renderTab = () => {
                switch (activeTab) {
                    case 'profile': return <ProfileTab />;
                    case 'loadout': return <LoadoutTab />;
                    case 'gear': return <GearTab />;
                    case 'skills': return <SkillsTab />;
                    case 'meta': return <MetaTab />;
                    default: return <ProfileTab />;
                }
            };

            return (
                <div className="min-h-screen bg-charcoal pb-20 md:pb-0">
                    <Header />
                    <TabNav />
                    <main className="max-w-6xl mx-auto px-4 py-6">{renderTab()}</main>
                </div>
            );
        };

        // ============ RENDER ============
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <PasswordGate>
                <AppProvider>
                    <App />
                </AppProvider>
            </PasswordGate>
        );
    </script>
</body>
</html>
