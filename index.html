                            <div className="space-y-2">
                                {profileHistory.slice(0, 5).map((eval_, i) => (
                                    <div key={i} className="flex items-center justify-between text-sm bg-charcoal rounded p-2">
                                        <span>{eval_.item_name}</span>
                                        <div className="flex items-center gap-2">
                                            <VerdictBadge verdict={eval_.verdict} color={eval_.color_rating} />
                                            <span className="text-xs text-gray-500">{new Date(eval_.timestamp).toLocaleDateString()}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============ SKILLS TAB ============
        const SkillsTab = () => {
            const { activeProfile, apiKey, addEvaluation, evaluationHistory, activeProfileId } = useContext(AppContext);
            const [inputMode, setInputMode] = useState('manual');
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');
            const [result, setResult] = useState(null);
            const [imageData, setImageData] = useState(null);
            const fileInputRef = useRef(null);

            const [manualSkill, setManualSkill] = useState({
                name: '', type: 'Spell', element: 'Fire', manaCost: 0,
                powerMin: 0, powerMax: 0, effect: '', sourceClass: ''
            });

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => setImageData(e.target.result);
                    reader.readAsDataURL(file);
                }
            };

            const evaluateSkill = async (isScreenshot = false) => {
                if (!apiKey) {
                    setError('Please enter your API key in the Profile tab');
                    return;
                }

                setIsLoading(true);
                setError('');
                setResult(null);

                try {
                    const systemPrompt = buildSystemPrompt(activeProfile);
                    let messages;

                    if (isScreenshot && imageData) {
                        const base64Data = imageData.split(',')[1];
                        const mediaType = imageData.split(';')[0].split(':')[1];

                        messages = [{
                            role: 'user',
                            content: [
                                { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64Data } },
                                { type: 'text', text: `Extract all visible information from this skill/spell screenshot and evaluate it for my build. Return JSON:
{
  "skill_name": "string",
  "extracted_info": { "type": "string", "element": "string", "mana_cost": number, "power_range": "string", "effect": "string" },
  "verdict": "Must Have|Strong Addition|Situational|Skip",
  "color_rating": "green|yellow|red",
  "build_fit_analysis": "string",
  "elemental_coverage": "string",
  "rotation_placement": "string",
  "replaces_what": "string",
  "priority": number,
  "rationale": "string"
}` }
                            ]
                        }];
                    } else {
                        messages = [{
                            role: 'user',
                            content: `Evaluate this skill for my build:

Skill: ${manualSkill.name}
Type: ${manualSkill.type}
Element: ${manualSkill.element}
Mana Cost: ${manualSkill.manaCost}
Power: ${manualSkill.powerMin}-${manualSkill.powerMax}
Effect: ${manualSkill.effect}
Source Class: ${manualSkill.sourceClass}

Return JSON:
{
  "skill_name": "string",
  "extracted_info": { "type": "string", "element": "string", "mana_cost": number, "power_range": "string", "effect": "string" },
  "verdict": "Must Have|Strong Addition|Situational|Skip",
  "color_rating": "green|yellow|red",
  "build_fit_analysis": "string",
  "elemental_coverage": "string",
  "rotation_placement": "string",
  "replaces_what": "string",
  "priority": number,
  "rationale": "string"
}`
                        }];
                    }

                    const response = await callClaudeAPI(apiKey, messages, systemPrompt, isScreenshot);
                    let textContent = response.content.find(c => c.type === 'text')?.text || '';

                    const jsonMatch = textContent.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        const parsed = JSON.parse(jsonMatch[0]);
                        setResult(parsed);
                        addEvaluation({ type: 'skill', ...parsed });
                    } else {
                        setResult({ rationale: textContent, verdict: 'Unknown', color_rating: 'yellow' });
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const profileHistory = evaluationHistory[activeProfileId]?.filter(e => e.type === 'skill') || [];

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="font-cinzel text-xl text-gold">Skill / Spell Evaluator</h2>
                        <div className="flex gap-2">
                            <button
                                onClick={() => setInputMode('screenshot')}
                                className={`px-3 py-1.5 rounded text-sm ${inputMode === 'screenshot' ? 'bg-gold/20 text-gold' : 'bg-slate text-gray-400'}`}
                            >
                                Screenshot
                            </button>
                            <button
                                onClick={() => setInputMode('manual')}
                                className={`px-3 py-1.5 rounded text-sm ${inputMode === 'manual' ? 'bg-gold/20 text-gold' : 'bg-slate text-gray-400'}`}
                            >
                                Manual
                            </button>
                        </div>
                    </div>

                    {inputMode === 'screenshot' ? (
                        <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                            <div
                                onClick={() => fileInputRef.current?.click()}
                                className="border-2 border-dashed border-gray-600 rounded-lg p-8 text-center cursor-pointer hover:border-gold/50 transition-colors"
                            >
                                {imageData ? (
                                    <img src={imageData} alt="Uploaded skill" className="max-h-64 mx-auto rounded" />
                                ) : (
                                    <div className="text-gray-400">
                                        <div className="text-4xl mb-2">✨</div>
                                        <p>Click to upload skill screenshot</p>
                                    </div>
                                )}
                            </div>
                            <input ref={fileInputRef} type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                            {imageData && (
                                <div className="flex gap-2 mt-4">
                                    <button onClick={() => evaluateSkill(true)} disabled={isLoading} className="flex-1 py-2 bg-gold/20 text-gold rounded hover:bg-gold/30 disabled:opacity-50">
                                        {isLoading ? 'Analyzing...' : 'Evaluate Skill'}
                                    </button>
                                    <button onClick={() => { setImageData(null); setResult(null); }} className="px-4 py-2 bg-gray-700 rounded hover:bg-gray-600">Clear</button>
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                            <div className="grid md:grid-cols-3 gap-4 mb-4">
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Skill Name</label>
                                    <input type="text" value={manualSkill.name} onChange={(e) => setManualSkill(prev => ({ ...prev, name: e.target.value }))} className="w-full bg-charcoal border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-gold" />
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Type</label>
                                    <select value={manualSkill.type} onChange={(e) => setManualSkill(prev => ({ ...prev, type: e.target.value }))} className="w-full bg-charcoal border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-gold">
                                        {SKILL_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Element</label>
                                    <select value={manualSkill.element} onChange={(e) => setManualSkill(prev => ({ ...prev, element: e.target.value }))} className="w-full bg-charcoal border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-gold">
                                        {[...ELEMENTS, 'Non-elemental'].map(el => <option key={el} value={el}>{el}</option>)}
                                    </select>
                                </div>
                            </div>

                            <div className="grid grid-cols-3 gap-4 mb-4">
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Mana Cost</label>
                                    <input type="number" inputMode="numeric" value={manualSkill.manaCost} onChange={(e) => setManualSkill(prev => ({ ...prev, manaCost: parseInt(e.target.value) || 0 }))} className="w-full bg-charcoal border border-gray-700 rounded px-3 py-2 text-sm" />
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Power Min</label>
                                    <input type="number" inputMode="numeric" value={manualSkill.powerMin} onChange={(e) => setManualSkill(prev => ({ ...prev, powerMin: parseInt(e.target.value) || 0 }))} className="w-full bg-charcoal border border-gray-700 rounded px-3 py-2 text-sm" />
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Power Max</label>
                                    <input type="number" inputMode="numeric" value={manualSkill.powerMax} onChange={(e) => setManualSkill(prev => ({ ...prev, powerMax: parseInt(e.target.value) || 0 }))} className="w-full bg-charcoal border border-gray-700 rounded px-3 py-2 text-sm" />
                                </div>
                            </div>

                            <div className="grid md:grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Effect Description</label>
                                    <textarea value={manualSkill.effect} onChange={(e) => setManualSkill(prev => ({ ...prev, effect: e.target.value }))} rows={3} placeholder="e.g., Deals fire damage and has a chance to burn the target" className="w-full bg-charcoal border border-gray-700 rounded px-3 py-2 text-sm resize-none focus:outline-none focus:border-gold" />
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Source Class</label>
                                    <input type="text" value={manualSkill.sourceClass} onChange={(e) => setManualSkill(prev => ({ ...prev, sourceClass: e.target.value }))} placeholder="e.g., Inquisitor" className="w-full bg-charcoal border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-gold" />
                                </div>
                            </div>

                            <button onClick={() => evaluateSkill(false)} disabled={isLoading || !manualSkill.name} className="w-full py-2 bg-gold/20 text-gold rounded hover:bg-gold/30 disabled:opacity-50">
                                {isLoading ? 'Evaluating...' : 'Evaluate Skill'}
                            </button>
                        </div>
                    )}

                    {isLoading && <LoadingSpinner />}
                    {error && <div className="bg-red-900/30 border border-red-700/50 rounded-lg p-4 text-red-400">{error}</div>}

                    {result && (
                        <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4 space-y-4">
                            <div className="flex items-center justify-between flex-wrap gap-2">
                                <h3 className="font-cinzel text-lg text-gold">{result.skill_name || 'Evaluation Result'}</h3>
                                <div className="flex items-center gap-2">
                                    <CopyButton
                                        text={`${result.skill_name || 'Skill'}\nVerdict: ${result.verdict}${result.build_fit_analysis ? '\nBuild Fit: ' + result.build_fit_analysis : ''}${result.elemental_coverage ? '\nElemental: ' + result.elemental_coverage : ''}${result.rotation_placement ? '\nRotation: ' + result.rotation_placement : ''}${result.replaces_what ? '\nReplaces: ' + result.replaces_what : ''}${result.priority ? '\nPriority: ' + result.priority + '/5' : ''}${result.rationale ? '\n\n' + result.rationale : ''}`}
                                        label="Copy"
                                    />
                                    <VerdictBadge verdict={result.verdict} color={result.color_rating} />
                                </div>
                            </div>

                            {result.build_fit_analysis && (
                                <div>
                                    <h4 className="text-sm text-gray-400 mb-1">Build Fit</h4>
                                    <p className="text-sm">{result.build_fit_analysis}</p>
                                </div>
                            )}

                            {result.elemental_coverage && (
                                <div>
                                    <h4 className="text-sm text-gray-400 mb-1">Elemental Coverage</h4>
                                    <p className="text-sm">{result.elemental_coverage}</p>
                                </div>
                            )}

                            {result.rotation_placement && (
                                <div>
                                    <h4 className="text-sm text-gray-400 mb-1">Rotation Placement</h4>
                                    <p className="text-sm">{result.rotation_placement}</p>
                                </div>
                            )}

                            {result.replaces_what && (
                                <div>
                                    <h4 className="text-sm text-gray-400 mb-1">Replaces</h4>
                                    <p className="text-sm">{result.replaces_what}</p>
                                </div>
                            )}

                            {result.priority && (
                                <div className="flex items-center gap-2">
                                    <span className="text-sm text-gray-400">Priority:</span>
                                    <div className="flex gap-1">
                                        {[1,2,3,4,5].map(n => (
                                            <span key={n} className={`w-4 h-4 rounded ${n <= result.priority ? 'bg-gold' : 'bg-gray-700'}`}></span>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {result.rationale && (
                                <div className="border-t border-gray-700 pt-3 mt-3">
                                    <p className="text-sm text-gray-300">{result.rationale}</p>
                                </div>
                            )}
                        </div>
                    )}

                    {profileHistory.length > 0 && (
                        <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                            <h3 className="font-cinzel text-gold mb-3">Recent Skill Evaluations</h3>
                            <div className="space-y-2">
                                {profileHistory.slice(0, 5).map((eval_, i) => (
                                    <div key={i} className="flex items-center justify-between text-sm bg-charcoal rounded p-2">
                                        <span>{eval_.skill_name}</span>
                                        <div className="flex items-center gap-2">
                                            <VerdictBadge verdict={eval_.verdict} color={eval_.color_rating} />
                                            <span className="text-xs text-gray-500">{new Date(eval_.timestamp).toLocaleDateString()}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============ LOADOUT TAB ============
        const LoadoutTab = () => {
            const { activeProfile, updateProfile } = useContext(AppContext);
            const [isEditing, setIsEditing] = useState(false);
            const [editGear, setEditGear] = useState(activeProfile.gear);
            const [editSkills, setEditSkills] = useState(activeProfile.skillLoadout);

            useEffect(() => {
                setEditGear(activeProfile.gear);
                setEditSkills(activeProfile.skillLoadout);
            }, [activeProfile]);

            const handleSave = () => {
                updateProfile({
                    gear: editGear,
                    skillLoadout: editSkills,
                    lastLoadoutUpdate: new Date().toISOString()
                });
                setIsEditing(false);
            };

            const updateGearSlot = (slot, field, value) => {
                setEditGear(prev => ({
                    ...prev,
                    [slot]: { ...prev[slot], [field]: value }
                }));
            };

            const updateSkill = (index, field, value) => {
                setEditSkills(prev => prev.map((s, i) => i === index ? { ...s, [field]: value } : s));
            };

            const addSkill = () => {
                setEditSkills(prev => [...prev, { name: 'New Skill', description: '' }]);
            };

            const removeSkill = (index) => {
                setEditSkills(prev => prev.filter((_, i) => i !== index));
            };

            const gearSlots = [
                { key: 'head', label: 'Head' },
                { key: 'torso', label: 'Torso' },
                { key: 'legs', label: 'Legs' },
                { key: 'weapon', label: 'Weapon' },
                { key: 'offhand', label: 'Off-hand' },
                { key: 'accessory1', label: 'Accessory 1' },
                { key: 'accessory2', label: 'Accessory 2' }
            ];

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <div>
                            <h2 className="font-cinzel text-xl text-gold">Current Loadout</h2>
                            <p className="text-xs text-gray-500 mt-1">
                                Last updated: {activeProfile.lastLoadoutUpdate ? new Date(activeProfile.lastLoadoutUpdate).toLocaleString() : 'Never'}
                            </p>
                        </div>
                        <div className="flex gap-2">
                            {isEditing ? (
                                <>
                                    <button onClick={handleSave} className="px-4 py-2 bg-green-900/50 text-green-400 rounded hover:bg-green-900/70 text-sm">Save</button>
                                    <button onClick={() => { setIsEditing(false); setEditGear(activeProfile.gear); setEditSkills(activeProfile.skillLoadout); }} className="px-4 py-2 bg-gray-700 rounded hover:bg-gray-600 text-sm">Cancel</button>
                                </>
                            ) : (
                                <button onClick={() => setIsEditing(true)} className="px-4 py-2 bg-darkred/50 rounded hover:bg-darkred/70 text-sm">Edit</button>
                            )}
                        </div>
                    </div>

                    <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                        <h3 className="font-cinzel text-gold mb-4">Equipped Gear</h3>
                        <div className="space-y-3">
                            {gearSlots.map(({ key, label }) => (
                                <div key={key} className="bg-charcoal rounded p-3">
                                    <div className="text-xs text-gray-500 mb-1">{label}</div>
                                    {isEditing ? (
                                        <div className="space-y-2">
                                            <input
                                                type="text"
                                                value={editGear[key]?.name || ''}
                                                onChange={(e) => updateGearSlot(key, 'name', e.target.value)}
                                                placeholder="Item name"
                                                className="w-full bg-slate border border-gray-700 rounded px-2 py-1 text-sm"
                                            />
                                            <input
                                                type="text"
                                                value={editGear[key]?.stats || ''}
                                                onChange={(e) => updateGearSlot(key, 'stats', e.target.value)}
                                                placeholder="Stats"
                                                className="w-full bg-slate border border-gray-700 rounded px-2 py-1 text-sm"
                                            />
                                            <input
                                                type="text"
                                                value={editGear[key]?.notes || ''}
                                                onChange={(e) => updateGearSlot(key, 'notes', e.target.value)}
                                                placeholder="Notes"
                                                className="w-full bg-slate border border-gray-700 rounded px-2 py-1 text-sm"
                                            />
                                        </div>
                                    ) : (
                                        <>
                                            <div className="text-gold">{activeProfile.gear[key]?.name || 'Empty'}</div>
                                            <div className="text-sm text-gray-400">{activeProfile.gear[key]?.stats}</div>
                                            {activeProfile.gear[key]?.notes && (
                                                <div className="text-xs text-ember mt-1">{activeProfile.gear[key].notes}</div>
                                            )}
                                        </>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-cinzel text-gold">Skill Loadout</h3>
                            {isEditing && (
                                <button onClick={addSkill} className="px-3 py-1 bg-gold/20 text-gold rounded text-sm hover:bg-gold/30">+ Add Skill</button>
                            )}
                        </div>
                        <div className="space-y-2">
                            {(isEditing ? editSkills : activeProfile.skillLoadout).map((skill, i) => (
                                <div key={i} className="bg-charcoal rounded p-3 flex items-start gap-3">
                                    {isEditing ? (
                                        <>
                                            <div className="flex-1 space-y-2">
                                                <input
                                                    type="text"
                                                    value={skill.name}
                                                    onChange={(e) => updateSkill(i, 'name', e.target.value)}
                                                    className="w-full bg-slate border border-gray-700 rounded px-2 py-1 text-sm"
                                                />
                                                <input
                                                    type="text"
                                                    value={skill.description}
                                                    onChange={(e) => updateSkill(i, 'description', e.target.value)}
                                                    className="w-full bg-slate border border-gray-700 rounded px-2 py-1 text-sm"
                                                />
                                            </div>
                                            <button onClick={() => removeSkill(i)} className="text-red-400 hover:text-red-300 text-sm">✕</button>
                                        </>
                                    ) : (
                                        <>
                                            <span className="text-gold">{skill.name}</span>
                                            <span className="text-gray-400 text-sm">— {skill.description}</span>
                                        </>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                        <h3 className="font-cinzel text-gold mb-3">Combat Rotation</h3>
                        <p className="text-sm text-gray-300">{activeProfile.combatRotation}</p>
                    </div>
                </div>
            );
        };

        // ============ META TAB ============
        const MetaTab = () => {
            const { activeProfile, updateProfile, apiKey } = useContext(AppContext);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');
            const [metaResults, setMetaResults] = useState(null);

            const lastUpdate = activeProfile.lastMetaUpdate ? new Date(activeProfile.lastMetaUpdate) : null;
            const daysSinceUpdate = lastUpdate ? Math.floor((Date.now() - lastUpdate) / (1000 * 60 * 60 * 24)) : null;
            const isStale = daysSinceUpdate === null || daysSinceUpdate > 21;

            const refreshMeta = async () => {
                if (!apiKey) {
                    setError('Please enter your API key in the Profile tab');
                    return;
                }

                setIsLoading(true);
                setError('');

                try {
                    const gameQuery = activeProfile.game === 'Orna: The GPS RPG' ? 'Orna GPS RPG' : 'Hero of Aethric';
                    const classQuery = activeProfile.classSpec.split('·')[0].trim();

                    const searchQuery = `${gameQuery} ${classQuery} T${activeProfile.tier} build guide patch notes 2024 2025`;

                    const characterSpecific = activeProfile.name === 'Biffius'
                        ? 'Also search for: Spiked Shield mechanics, Gilgamesh build, tank raid builds'
                        : 'Also search for: Weaved Elemancy, Omnimancer build, mage flask system';

                    const systemPrompt = `You are a game meta analyst for ${activeProfile.game}. Search for recent patch notes, tier lists, and build discussions. Focus on T${activeProfile.tier} ${activeProfile.playstyle} builds. Priority sources: blog.ornarpg.com, r/OrnaRPG, r/HeroOfAethric, playorna.com/releases.`;

                    const messages = [{
                        role: 'user',
                        content: `Search for the latest meta information for my character:

Game: ${activeProfile.game}
Class: ${activeProfile.classSpec}
Tier: ${activeProfile.tier}
Playstyle: ${activeProfile.playstyle}
Endgame Target: ${activeProfile.endgameTarget}

${characterSpecific}

Search for:
1. Recent patch notes affecting this class/playstyle
2. Current tier list standings for T${activeProfile.tier}
3. Community build discussions and recommendations
4. Any changes to key mechanics (${activeProfile.name === 'Biffius' ? 'Spiked Shield, tank mechanics' : 'Weaved Elemancy, mage flask'})
5. New T${activeProfile.tier} gear worth farming

Return a dated summary of what's changed and any recommendations.`
                    }];

                    const response = await callClaudeAPI(apiKey, messages, systemPrompt, false, true);

                    let textContent = '';
                    for (const block of response.content) {
                        if (block.type === 'text') {
                            textContent += block.text;
                        }
                    }

                    setMetaResults(textContent);
                    updateProfile({
                        metaNotes: textContent,
                        lastMetaUpdate: new Date().toISOString()
                    });
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="font-cinzel text-xl text-gold">Meta Refresh</h2>
                        <button
                            onClick={refreshMeta}
                            disabled={isLoading}
                            className="px-4 py-2 bg-gold/20 text-gold rounded hover:bg-gold/30 disabled:opacity-50 flex items-center gap-2"
                        >
                            {isLoading ? (
                                <>
                                    <span className="w-4 h-4 border-2 border-gold border-t-transparent rounded-full animate-spin"></span>
                                    Searching...
                                </>
                            ) : (
                                <>🔄 Refresh Meta</>
                            )}
                        </button>
                    </div>

                    {isStale && (
                        <div className="bg-yellow-900/30 border border-yellow-700/50 rounded-lg p-4 text-yellow-400">
                            ⚠️ Meta data is {daysSinceUpdate === null ? 'not available' : `${daysSinceUpdate} days old`}. Consider refreshing for the latest information.
                        </div>
                    )}

                    <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="font-cinzel text-gold">Character Focus</h3>
                            <span className="text-xs text-gray-500">
                                {lastUpdate ? `Last updated: ${lastUpdate.toLocaleDateString()}` : 'Never updated'}
                            </span>
                        </div>
                        <div className="grid md:grid-cols-2 gap-4 text-sm">
                            <div>
                                <span className="text-gray-400">Class:</span> <span className="text-white">{activeProfile.classSpec}</span>
                            </div>
                            <div>
                                <span className="text-gray-400">Target:</span> <span className="text-white">{activeProfile.endgameTarget}</span>
                            </div>
                            <div>
                                <span className="text-gray-400">Playstyle:</span> <span className="text-white">{activeProfile.playstyle}</span>
                            </div>
                            <div>
                                <span className="text-gray-400">Tier:</span> <span className="text-white">T{activeProfile.tier}</span>
                            </div>
                        </div>

                        {activeProfile.name === 'Biffius' && (
                            <div className="mt-4 p-3 bg-darkred/20 rounded text-sm">
                                <strong className="text-gold">Key Mechanics to Track:</strong>
                                <ul className="mt-2 space-y-1 text-gray-300">
                                    <li>• Spiked Shield mechanics and scaling</li>
                                    <li>• Tank viability in current raid meta</li>
                                    <li>• Defense/Ward breakpoints for T7</li>
                                </ul>
                            </div>
                        )}

                        {activeProfile.name === 'Spiffius' && (
                            <div className="mt-4 p-3 bg-darkred/20 rounded text-sm">
                                <strong className="text-gold">Key Mechanics to Track:</strong>
                                <ul className="mt-2 space-y-1 text-gray-300">
                                    <li>• Weaved Elemancy damage bonuses</li>
                                    <li>• Mage flask system changes</li>
                                    <li>• Omnimancer requirements and viability</li>
                                </ul>
                            </div>
                        )}
                    </div>

                    {isLoading && <LoadingSpinner message="Searching the meta..." />}
                    {error && <div className="bg-red-900/30 border border-red-700/50 rounded-lg p-4 text-red-400">{error}</div>}

                    {(metaResults || activeProfile.metaNotes) && (
                        <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                            <h3 className="font-cinzel text-gold mb-3">What's Changed</h3>
                            <div className="prose prose-invert prose-sm max-w-none">
                                <div className="whitespace-pre-wrap text-sm text-gray-300">
                                    {metaResults || activeProfile.metaNotes}
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
                        <h3 className="font-cinzel text-gold mb-3">Priority Sources</h3>
                        <div className="grid md:grid-cols-2 gap-3 text-sm">
                            <a href="https://blog.ornarpg.com" target="_blank" rel="noopener" className="flex items-center gap-2 text-gray-300 hover:text-gold">
                                🔗 blog.ornarpg.com
                            </a>
                            <a href="https://playorna.com/releases" target="_blank" rel="noopener" className="flex items-center gap-2 text-gray-300 hover:text-gold">
                                🔗 playorna.com/releases
                            </a>
                            <a href="https://reddit.com/r/OrnaRPG" target="_blank" rel="noopener" className="flex items-center gap-2 text-gray-300 hover:text-gold">
                                🔗 r/OrnaRPG
                            </a>
                            <a href="https://reddit.com/r/HeroOfAethric" target="_blank" rel="noopener" className="flex items-center gap-2 text-gray-300 hover:text-gold">
                                🔗 r/HeroOfAethric
                            </a>
                        </div>
                    </div>
                </div>
            );
        };

        // ============ MAIN APP ============
        const App = () => {
            const { activeTab, setActiveTab, apiKey, activeProfile, addEvaluation } = useContext(AppContext);
            const [fabLoading, setFabLoading] = useState(false);
            const [fabResult, setFabResult] = useState(null);
            const [fabError, setFabError] = useState('');
            const [showFabModal, setShowFabModal] = useState(false);

            const handleFabFileSelect = async (file) => {
                if (!apiKey) {
                    setFabError('Please enter your API key in the Profile tab first');
                    setShowFabModal(true);
                    return;
                }

                setFabLoading(true);
                setFabError('');
                setFabResult(null);
                setShowFabModal(true);

                try {
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const imageData = e.target.result;
                        const base64Data = imageData.split(',')[1];
                        const mediaType = imageData.split(';')[0].split(':')[1];

                        const systemPrompt = buildSystemPrompt(activeProfile);
                        const messages = [{
                            role: 'user',
                            content: [
                                { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64Data } },
                                { type: 'text', text: `Extract all visible stats from this gear screenshot and evaluate it for my build. Return your response as JSON with this structure:
{
  "item_name": "string",
  "extracted_stats": { "tier": number, "slot": "string", "quality": "string", "level": number, "attack": number, "defense": number, "resistance": number, "hp": number, "mana": number, "ward": number, "magic": number, "dexterity": number, "foresight": number, "element": "string", "ability": "string", "useableBy": "string" },
  "verdict": "Upgrade|Sidegrade|Downgrade|Wrong class|Situational",
  "color_rating": "green|yellow|red",
  "stat_comparison": [{"stat": "string", "current": number, "new": number, "change": "string"}],
  "synergy_analysis": "string",
  "flags": ["string"],
  "ability_analysis": "string",
  "upgrade_priority": number,
  "rationale": "string"
}` }
                            ]
                        }];

                        const response = await callClaudeAPI(apiKey, messages, systemPrompt, true);
                        let textContent = response.content.find(c => c.type === 'text')?.text || '';
                        const jsonMatch = textContent.match(/\{[\s\S]*\}/);
                        if (jsonMatch) {
                            const parsed = JSON.parse(jsonMatch[0]);
                            setFabResult(parsed);
                            addEvaluation({ type: 'gear', ...parsed });
                        } else {
                            setFabResult({ rationale: textContent, verdict: 'Unknown', color_rating: 'yellow' });
                        }
                        setFabLoading(false);
                    };
                    reader.readAsDataURL(file);
                } catch (err) {
                    setFabError(err.message);
                    setFabLoading(false);
                }
            };

            const renderTab = () => {
                switch (activeTab) {
                    case 'profile': return <ProfileTab />;
                    case 'gear': return <GearTab />;
                    case 'skills': return <SkillsTab />;
                    case 'loadout': return <LoadoutTab />;
                    case 'meta': return <MetaTab />;
                    default: return <ProfileTab />;
                }
            };

            return (
                <div className="min-h-screen bg-charcoal pb-20 md:pb-0">
                    <Header />
                    <TabNav />
                    <main className="max-w-6xl mx-auto px-4 py-6">
                        {renderTab()}
                    </main>
                    <footer className="border-t border-darkred/30 py-4 text-center text-xs text-gray-500 mb-16 md:mb-0">
                        AethricAdvisor - Build-aware gear and skill optimizer
                    </footer>

                    {/* Floating Action Button */}
                    <FloatingActionButton onFileSelect={handleFabFileSelect} />

                    {/* FAB Quick Evaluation Modal */}
                    {showFabModal && (
                        <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4" onClick={() => !fabLoading && setShowFabModal(false)}>
                            <div className="bg-charcoal border border-darkred/50 rounded-lg p-4 max-w-md w-full max-h-[80vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-cinzel text-gold">Quick Evaluation</h3>
                                    {!fabLoading && (
                                        <button onClick={() => setShowFabModal(false)} className="text-gray-400 hover:text-white text-xl">&times;</button>
                                    )}
                                </div>

                                {fabLoading && <LoadingSpinner message="Analyzing screenshot..." />}

                                {fabError && (
                                    <div className="bg-red-900/30 border border-red-700/50 rounded p-3 text-red-400 text-sm">
                                        {fabError}
                                    </div>
                                )}

                                {fabResult && (
                                    <div className="space-y-3">
                                        <div className="flex items-center justify-between flex-wrap gap-2">
                                            <span className="font-medium">{fabResult.item_name}</span>
                                            <VerdictBadge verdict={fabResult.verdict} color={fabResult.color_rating} />
                                        </div>

                                        {fabResult.flags?.length > 0 && (
                                            <div className="flex flex-wrap gap-1">
                                                {fabResult.flags.map((flag, i) => (
                                                    <span key={i} className="px-2 py-0.5 bg-darkred/30 text-xs rounded">{flag}</span>
                                                ))}
                                            </div>
                                        )}

                                        {fabResult.synergy_analysis && (
                                            <p className="text-sm text-gray-300">{fabResult.synergy_analysis}</p>
                                        )}

                                        {fabResult.rationale && (
                                            <p className="text-sm text-gray-400 border-t border-gray-700 pt-2">{fabResult.rationale}</p>
                                        )}

                                        <div className="flex gap-2 pt-2">
                                            <CopyButton
                                                text={`${fabResult.item_name || 'Item'}\nVerdict: ${fabResult.verdict}${fabResult.flags?.length ? '\nFlags: ' + fabResult.flags.join(', ') : ''}${fabResult.synergy_analysis ? '\n' + fabResult.synergy_analysis : ''}${fabResult.rationale ? '\n\n' + fabResult.rationale : ''}`}
                                                label="Copy Result"
                                            />
                                            <button
                                                onClick={() => { setActiveTab('gear'); setShowFabModal(false); }}
                                                className="px-3 py-1.5 text-xs bg-slate hover:bg-gray-700 rounded text-gray-300"
                                            >
                                                Go to Gear Tab
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============ RENDER ============
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <PasswordGate>
                <AppProvider>
                    <App />
                </AppProvider>
            </PasswordGate>
        );
    </script>
</body>
</html>
