        tailwind.config = {

    <style>
        body { background-color: #1a1a1a; }
        .scrollbar-dark::-webkit-scrollbar { width: 8px; }
        .scrollbar-dark::-webkit-scrollbar-track { background: #2d2d2d; }
        .scrollbar-dark::-webkit-scrollbar-thumb { background: #8B0000; border-radius: 4px; }

    </style>
</head>
<body class="bg-charcoal text-white font-inter min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useContext, createContext, useRef, useCallback } = React;

        // ============ PASSWORD - Change this to set your app password ============
        const APP_PASSWORD = 'AethricApp!984';
        const SESSION_AUTH_KEY = 'aethric_authenticated';

        // ============ CONSTANTS ============

            'Earthen Legion': { emoji: '🌍', bonus: '+25% earth damage, -20% earth damage taken', element: 'Earth' },

        const GAMES = ['Hero of Aethric', 'Orna: The GPS RPG'];
        const PLAYSTYLES = ['Physical DPS', 'Tank', 'Mage DPS', 'Hybrid', 'Endgame Raid'];
        const SLOTS = ['Weapon', 'Off-hand', 'Head', 'Torso', 'Legs', 'Accessory 1', 'Accessory 2'];
        const QUALITIES = ['Broken', 'Poor', 'Common', 'Superior', 'Famed', 'Legendary', 'Ornate'];
        const ELEMENTS = ['None', 'Fire', 'Water', 'Earth', 'Lightning', 'Holy', 'Dark', 'Arcane'];
        const SKILL_TYPES = ['Active Skill', 'Passive Ability', 'Spell', 'Ward Skill', 'Buff', 'Debuff', 'Cleanse'];
        const USEABLE_BY = ['All', 'Warrior', 'Mage', 'Thief', 'Melee'];

        const LOADING_MESSAGES = [
            "Consulting the Codex...",
            "Checking the Runeshop...",
            "Asking the Archduid...",
            "Deciphering ancient runes...",
            "Communing with the spirits...",

        // ============ DEFAULT PROFILES ============
        const DEFAULT_PROFILES = [

                currentStats: {
                    hp: 4452, ward: 3005, attack: 1086, defense: 1689,
                    resistance: 148, dexterity: 148, foresight: 340, crit: 5
                },
                gear: {
                    head: { name: 'Legendary Colossal Helmet L4', stats: 'Def 426, Res -60', notes: 'PROBLEM PIECE — negative Res' },
                    torso: { name: 'Legendary Colossal Armor L3', stats: 'Def 373, Res -58', notes: 'PROBLEM PIECE — negative Res. Legendary High Draconian Armor L7 upgrading — likely replacement.' },
                    legs: { name: 'Legendary Orichalcum Leggings L3', stats: 'Def 419, Res 52, Mag -36', notes: '' },
                    weapon: { name: 'Ornate High Fomorian Sword L6', stats: 'Att 448', notes: 'Being replaced by Tiamat axe' },
                    offhand: { name: 'Superior Balin\'s Left', stats: 'Att 14, Ward 21%', notes: 'Low quality, replace when better drops. Legendary Bone Shield L7 upgrading — will return to off-hand slot when done.' },
                    accessory1: { name: 'Ornate Troll\'s Charm', stats: 'Broad stat boosts', notes: 'Adequate for now' },
                    accessory2: { name: 'Ornate Troll\'s Charm', stats: 'Broad stat boosts', notes: 'Adequate for now' }
                },
                knownWeaknesses: "Resistance is critically low at 148 due to Colossal gear giving negative Res penalties. Boss magical ultimates and raid special attacks are the primary threat. Must prioritise Res when evaluating new head and torso pieces even at the cost of some Defense. Any item that further reduces Resistance should be flagged as dangerous regardless of other stats.",
                skillLoadout: [
                    { name: 'Swordplay', description: 'Multi-hit physical, 814-1357 x3' },
                    { name: 'Firestrike III', description: 'Fire, 2172' },
                    { name: 'Icestrike III', description: 'Ice, 2172' },
                    { name: 'Earthstrike III', description: 'Earth, 2172' },
                    { name: 'Lightningstrike III', description: 'Lightning, 2172' },
                    { name: 'Mighty Bastion', description: 'Ward restore, use first every dungeon floor' },
                    { name: 'Cleanse', description: 'Status cure + Def/Res boost' },
                    { name: 'Rampart III', description: 'Defensive buff' },
                    { name: 'Cleansing Strikes', description: 'Multi-hit with cleanse, 868-1411 x3' }
                ],
                combatRotation: "Turn 1 Mighty Bastion (establish Ward), Turn 2 Rampart III (boost defenses), Turn 3+ elemental strikes cycling for damage. Use Cleanse when status-afflicted. Use Smite for high-value targets.",
                upgradePriorities: "Bone Shield to L10, Tiamat Axe to L10, replace Colossal Helmet with balanced T7 head piece, upgrade Draconian Armor and compare to Colossal Armor.",
                ornsAvailable: 0,
                metaNotes: '',
                lastMetaUpdate: null,
                lastLoadoutUpdate: new Date().toISOString()
            },
            {
                id: 'spiffius-default',
                name: 'Spiffius',
                game: 'Orna: The GPS RPG',
                classSpec: 'Archduid · Magus',
                tier: 7,
                level: 158,
                faction: 'Knights of Inferno',
                playstyle: 'Mage DPS',
                endgameTarget: 'Omnimancer',
                buildNotes: "Pure mage build. Key passive: Weaved Elemancy — damage increases when cycling different elemental spells in sequence. Must hit multiple elements per combat for full damage. Magus spec gives 25% spell cost reduction and Great Meditation skill — essential for mana sustainability. Fire faction bonus means Multi-flame and Wildfire II are priority damage spells. Arcane Slime follower currently equipped (provides Arcana/Arcana II buffs). Twilight Wisp is the target follower upgrade (T7, 300,000 Orns — in stock check periodically). Ornate Black Witch Staff (T7, Mag 525, Dark imbued, L7) is main weapon — excellent, keep upgrading to L10. Ornate Witch's Scroll off-hand (Mana 153, Ward 23%, Foresight 46, Read Scroll II ability) — good mage off-hand. Bone Shield (Bastion ability) used in dungeon loadout for Ward restoration.",
                currentStats: {
                    hp: 0, ward: 0, attack: 0, defense: 0,
                    resistance: 0, dexterity: 0, foresight: 0, crit: 0, mana: 0, magic: 0
                },
                gear: {
                    head: { name: 'Legendary Aaru Circlet L7', stats: 'Mana 231, Def 90, Res 341', notes: 'Good mage headpiece' },
                    torso: { name: 'High Fomorian Robe L9', stats: 'Def 76, Res 299', notes: 'Nearly maxed, good' },
                    legs: { name: 'Legendary Dagda Boots', stats: 'Def 161, Res 161, Dex 12, Ward 2%, Arcane imbued', notes: '' },
                    weapon: { name: 'Ornate Black Witch Staff L7', stats: 'Mag 525, Dark imbued, 4 adornment slots', notes: 'Excellent — priority upgrade to L10' },
                    offhand: { name: 'Ornate Witch\'s Scroll', stats: 'Mana 153, Ward 23%, Foresight 46, Read Scroll II ability', notes: '' },
                    accessory1: { name: 'Superior Troll\'s Charm', stats: 'Low quality T4', notes: 'WEAK LINK — priority replacement with T7 Legendary/Ornate' },
                    accessory2: { name: 'Troll\'s Charm (L)', stats: 'Low quality T4', notes: 'WEAK LINK — priority replacement with T7 Legendary/Ornate' }
                },
                knownWeaknesses: "Defense is low for a mage (expected) but Ward compensates. Accessories are significantly undertiered at T4 — replacing both with T7 equivalents is the single biggest available upgrade. Dark-imbued staff doesn't provide fire faction bonus on weapon damage but fire spells still benefit. Mana management important — Magus spec helps but dungeon runs can drain mana on long floors.",
                skillLoadout: [
                    { name: 'Golem\'s Fortitude', description: 'Def/Res buff, cast Turn 1' },
                    { name: 'Sorrow III', description: 'Magic debuff on enemy, cast Turn 2' },
                    { name: 'Multi-flame', description: 'Fire x3, 894-1533, faction bonus' },
                    { name: 'Wildfire II', description: 'Fire single, 1789' },
                    { name: 'Multi-frost', description: 'Ice x3, 894-1533' },
                    { name: 'Frost IV', description: 'Ice single, 1917' },
                    { name: 'Multi-spark', description: 'Lightning x3, 894-1533' },
                    { name: 'Multi-tremor', description: 'Earth x3, 894-1533' },
                    { name: 'Faith', description: 'Holy, 1917' },
                    { name: 'Nightmare', description: 'Dark, 1917' },
                    { name: 'Blast III', description: 'Non-elemental, 2556 — highest damage, use vs elementally immune enemies' },
                    { name: 'Magic Sword II', description: 'Non-elemental physical-magic hybrid, 1533' }
                ],
                combatRotation: "Turn 1 Golem's Fortitude (Def/Res buff), Turn 2 Sorrow III (debuff enemy magic), Turn 3+ cycle elements for Weaved Elemancy bonus — fire first for faction bonus, then rotate ice/lightning/earth/holy/dark. Use Blast III against elementally immune enemies. Use Wildfire II for fire-weak enemies.",
                upgradePriorities: "Black Witch Staff to L10, replace both accessories with T7 Legendary/Ornate pieces, acquire Twilight Wisp follower (300,000 Orns).",
                ornsAvailable: 723055,
                metaNotes: '',
                lastMetaUpdate: null,
                lastLoadoutUpdate: new Date().toISOString()
            }
        ];

        // ============ CONTEXT ============
        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [profiles, setProfiles] = useState(() => {
                const saved = localStorage.getItem('aethric_profiles');
                return saved ? JSON.parse(saved) : DEFAULT_PROFILES;
            });
            const [activeProfileId, setActiveProfileId] = useState(() => {
                const saved = localStorage.getItem('aethric_active_profile');
                return saved || DEFAULT_PROFILES[0].id;
            });
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('aethric_api_key') || '');
            const [evaluationHistory, setEvaluationHistory] = useState(() => {
                const saved = localStorage.getItem('aethric_eval_history');
                return saved ? JSON.parse(saved) : {};
            });
            const [activeTab, setActiveTab] = useState('profile');

            useEffect(() => {
                localStorage.setItem('aethric_profiles', JSON.stringify(profiles));
            }, [profiles]);

            useEffect(() => {
                localStorage.setItem('aethric_active_profile', activeProfileId);
            }, [activeProfileId]);

            useEffect(() => {
                localStorage.setItem('aethric_api_key', apiKey);
            }, [apiKey]);

            useEffect(() => {
                localStorage.setItem('aethric_eval_history', JSON.stringify(evaluationHistory));
            }, [evaluationHistory]);

            const activeProfile = profiles.find(p => p.id === activeProfileId) || profiles[0];

            const updateProfile = (updates) => {
                setProfiles(prev => prev.map(p =>
                    p.id === activeProfileId ? { ...p, ...updates } : p
                ));
            };

            const addEvaluation = (evaluation) => {
                setEvaluationHistory(prev => {
                    const profileHistory = prev[activeProfileId] || [];
                    const updated = [{ ...evaluation, timestamp: new Date().toISOString() }, ...profileHistory].slice(0, 10);
                    return { ...prev, [activeProfileId]: updated };
                });
            };

            const addProfile = (profile) => {
                const newProfile = {
                    ...DEFAULT_PROFILES[0],
                    ...profile,
                    id: `profile-${Date.now()}`,
                    gear: { ...DEFAULT_PROFILES[0].gear },
                    skillLoadout: [],
                    currentStats: { ...DEFAULT_PROFILES[0].currentStats }
                };
                setProfiles(prev => [...prev, newProfile]);
                setActiveProfileId(newProfile.id);
            };

            const deleteProfile = (id) => {
                if (profiles.length <= 1) return;
                setProfiles(prev => prev.filter(p => p.id !== id));
                if (activeProfileId === id) {
                    setActiveProfileId(profiles.find(p => p.id !== id)?.id);
                }
            };

            return (
                <AppContext.Provider value={{
                    profiles, setProfiles, activeProfile, activeProfileId, setActiveProfileId,
                    updateProfile, apiKey, setApiKey, evaluationHistory, addEvaluation,
                    activeTab, setActiveTab, addProfile, deleteProfile
                }}>
                    {children}
                </AppContext.Provider>
            );
        };

        // ============ API SERVICE ============
        const callClaudeAPI = async (apiKey, messages, systemPrompt, useVision = false, useWebSearch = false) => {
            const tools = useWebSearch ? [{
                type: "web_search_20250305",
                name: "web_search",
                max_uses: 5
            }] : undefined;

            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 4096,
                    system: systemPrompt,
                    messages: messages,
                    ...(tools && { tools })
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API request failed');
            }

            return response.json();
        };

        const buildSystemPrompt = (profile) => {
            return `You are AethricAdvisor, a build advisor for Hero of Aethric and Orna: The GPS RPG. You evaluate gear and skills not just on raw stats but on fit with the player's build identity, faction synergies, known weaknesses, and combat rotation. Be direct and opinionated. Flag problems clearly. Prioritise survivability concerns over raw damage for tank builds.

ACTIVE CHARACTER PROFILE:
Name: ${profile.name}
Game: ${profile.game}
Class: ${profile.classSpec}
Tier: ${profile.tier} | Level: ${profile.level}
Faction: ${profile.faction} (${FACTIONS[profile.faction]?.bonus || ''})
Playstyle: ${profile.playstyle}
Endgame Target: ${profile.endgameTarget}

BUILD NOTES: ${profile.buildNotes}

CURRENT STATS:
HP: ${profile.currentStats.hp} | Ward: ${profile.currentStats.ward} | Attack: ${profile.currentStats.attack}
Defense: ${profile.currentStats.defense} | Resistance: ${profile.currentStats.resistance}
Dexterity: ${profile.currentStats.dexterity} | Foresight: ${profile.currentStats.foresight} | Crit: ${profile.currentStats.crit}%
${profile.currentStats.mana ? `Mana: ${profile.currentStats.mana} | Magic: ${profile.currentStats.magic}` : ''}

CURRENT GEAR:
${Object.entries(profile.gear).map(([slot, item]) => `${slot}: ${item.name} (${item.stats}) ${item.notes ? `[${item.notes}]` : ''}`).join('\n')}

KNOWN WEAKNESSES: ${profile.knownWeaknesses}

CURRENT SKILL LOADOUT:
${profile.skillLoadout.map(s => `- ${s.name}: ${s.description}`).join('\n')}

COMBAT ROTATION: ${profile.combatRotation}

UPGRADE PRIORITIES: ${profile.upgradePriorities}

${profile.name === 'Biffius' ? 'CRITICAL: Always flag if an item worsens his critically low Resistance of 148. Resistance is the primary concern for this build.' : ''}
${profile.name === 'Spiffius' ? 'CRITICAL: Always check elemental coverage for Weaved Elemancy passive. The build needs multiple elements cycled per combat for maximum damage.' : ''}`;
        };

        // ============ COMPONENTS ============

        // Password Gate Component
        const PasswordGate = ({ children }) => {
            const [isAuthenticated, setIsAuthenticated] = useState(() => {
                return sessionStorage.getItem(SESSION_AUTH_KEY) === 'true';
            });
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [isShaking, setIsShaking] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (password === APP_PASSWORD) {
                    sessionStorage.setItem(SESSION_AUTH_KEY, 'true');
                    setIsAuthenticated(true);
                    setError('');
                } else {
                    setError('Incorrect password. Access denied.');
                    setIsShaking(true);
                    setTimeout(() => setIsShaking(false), 500);
                    setPassword('');
                }
            };

            if (isAuthenticated) {
                return children;
            }

            return (
                <div className="fixed inset-0 bg-obsidian flex items-center justify-center z-[9999]">
                    <div className={`bg-charcoal border-2 border-darkred/50 rounded-lg p-8 max-w-md w-full mx-4 shadow-2xl ${isShaking ? 'animate-shake' : ''}`}>
                        <div className="text-center mb-8">
                            <h1 className="font-cinzel text-3xl text-gold mb-2">AethricAdvisor</h1>
                            <p className="text-gray-400 text-sm">Enter password to access the sanctum</p>
                        </div>
                        <form onSubmit={handleSubmit}>
                            <div className="mb-4">
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => { setPassword(e.target.value); setError(''); }}
                                    placeholder="Enter password..."
                                    autoFocus
                                    className="w-full bg-slate border border-gray-700 rounded-lg px-4 py-3 text-center text-lg focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold/50 placeholder-gray-500"
                                />
                            </div>
                            {error && (
                                <div className="mb-4 p-3 bg-red-900/30 border border-red-700/50 rounded text-red-400 text-sm text-center">
                                    {error}
                                </div>
                            )}
                            <button
                                type="submit"
                                className="w-full py-3 bg-darkred/70 hover:bg-darkred text-white font-cinzel rounded-lg transition-colors glow-red"
                            >
                                Enter the Codex
                            </button>
                        </form>
                        <div className="mt-6 text-center">
                            <span className="text-gray-600 text-xs">Build-aware gear and skill optimizer</span>
                        </div>
                    </div>
                    <style>{`
                        @keyframes shake {
                            0%, 100% { transform: translateX(0); }
                            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                            20%, 40%, 60%, 80% { transform: translateX(5px); }
                        }
                        .animate-shake { animation: shake 0.5s ease-in-out; }
                    `}</style>
                </div>
            );
        };

        // Header Component
        const Header = () => {
            const { activeProfile, profiles, activeProfileId, setActiveProfileId } = useContext(AppContext);
            const faction = FACTIONS[activeProfile.faction];

            return (
                <header className="bg-obsidian border-b border-darkred/50 sticky top-0 z-50">
                    <div className="max-w-6xl mx-auto px-4 py-3">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <h1 className="font-cinzel text-xl md:text-2xl text-gold">AethricAdvisor</h1>
                                <span className="text-xs text-gray-500 hidden sm:inline">Build Optimizer</span>
                            </div>
                            <select
                                value={activeProfileId}
                                onChange={(e) => setActiveProfileId(e.target.value)}
                                className="bg-slate border border-darkred/50 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-gold"
                            >
                                {profiles.map(p => (
                                    <option key={p.id} value={p.id}>{p.name}</option>
                                ))}
                            </select>
                        </div>
                        <div className="mt-2 flex items-center gap-2 text-sm">
                            <span className="text-2xl">{faction?.emoji}</span>
                            <span className="text-gold font-cinzel">{activeProfile.name}</span>
                            <span className="text-gray-400">·</span>
                            <span className="text-gray-300">{activeProfile.classSpec}</span>
                            <span className="bg-darkred/50 px-2 py-0.5 rounded text-xs">T{activeProfile.tier}</span>
                            {activeProfile.ornsAvailable > 0 && (
                                <span className="text-gold text-xs ml-auto">
                                    {activeProfile.ornsAvailable.toLocaleString()} Orns
                                </span>
                            )}
                        </div>
                    </div>
                </header>
            );
        };

        // Tab Navigation - Bottom on mobile, top on desktop
        const TabNav = () => {
            const { activeTab, setActiveTab } = useContext(AppContext);
            const tabs = [
                { id: 'profile', label: 'Profile', icon: '👤' },
                { id: 'gear', label: 'Gear', icon: '⚔️' },
                { id: 'skills', label: 'Skills', icon: '✨' },
                { id: 'loadout', label: 'Loadout', icon: '🎒' },
                { id: 'meta', label: 'Meta', icon: '📊' }
            ];

            return (
                <>
                    {/* Desktop: Top navigation */}
                    <nav className="hidden md:block bg-slate border-b border-darkred/30 sticky top-[88px] z-40">
                        <div className="max-w-6xl mx-auto px-4">
                            <div className="flex overflow-x-auto scrollbar-dark">
                                {tabs.map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`px-4 py-3 text-sm font-medium whitespace-nowrap transition-colors ${
                                            activeTab === tab.id
                                                ? 'text-gold border-b-2 border-gold'
                                                : 'text-gray-400 hover:text-white'
                                        }`}
                                    >
                                        {tab.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>
                    {/* Mobile: Bottom navigation */}
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-obsidian border-t border-darkred/50 z-40 pb-safe">
                        <div className="flex justify-around">
                            {tabs.map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex-1 py-3 flex flex-col items-center gap-1 transition-colors ${
                                        activeTab === tab.id
                                            ? 'text-gold'
                                            : 'text-gray-500'
                                    }`}
                                >
                                    <span className="text-lg">{tab.icon}</span>
                                    <span className="text-xs">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                </>
            );
        };

        // Floating Action Button for quick screenshot evaluation
        const FloatingActionButton = ({ onFileSelect }) => {
            const fileInputRef = useRef(null);

            const handleClick = () => {
                fileInputRef.current?.click();
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    onFileSelect(file);
                }
                e.target.value = '';
            };

            return (
                <>
                    <input
                        ref={fileInputRef}
                        type="file"
                        accept="image/*"
                        onChange={handleFileChange}
                        className="hidden"
                    />
                    <button
                        onClick={handleClick}
                        className="md:hidden fixed bottom-20 right-4 z-50 bg-darkred hover:bg-red-800 text-white rounded-full p-4 shadow-lg glow-red flex flex-col items-center gap-1 transition-transform active:scale-95"
                        style={{ minWidth: '72px' }}
                    >
                        <span className="text-2xl">📷</span>
                        <span className="text-xs font-medium whitespace-nowrap">Evaluate</span>
                    </button>
                </>

                if (!apiKey) {

                setError('');
                setResult(null);

                try {
                    const systemPrompt = buildSystemPrompt(activeProfile);
                    let messages;

                    if (isScreenshot && imageData) {
                        const base64Data = imageData.split(',')[1];
                        const mediaType = imageData.split(';')[0].split(':')[1];

                        messages = [{
                            role: 'user',
                            content: [
                                {
                                    type: 'image',
                                    source: { type: 'base64', media_type: mediaType, data: base64Data }
                                },

                                    type: 'text',
                                    text: `Extract all visible stats from this gear screenshot and evaluate it for my build. Return your response as JSON with this structure:
{
  "item_name": "string",

  "verdict": "Upgrade|Sidegrade|Downgrade|Wrong class|Situational",
  "color_rating": "green|yellow|red",
  "stat_comparison": [{"stat": "string", "current": number, "new": number, "change": "string"}],
  "synergy_analysis": "string",
  "flags": ["string"],
  "ability_analysis": "string",
  "upgrade_priority": number,
  "rationale": "string"
}`

Item: ${manualGear.name}
Tier: ${manualGear.tier} | Quality: ${manualGear.quality} | Level: ${manualGear.level}
Slot: ${manualGear.slot}
Stats: Attack ${manualGear.attack}, Defense ${manualGear.defense}, Resistance ${manualGear.resistance}, HP ${manualGear.hp}, Mana ${manualGear.mana}, Ward ${manualGear.ward}%, Magic ${manualGear.magic}, Dexterity ${manualGear.dexterity}, Foresight ${manualGear.foresight}
Element: ${manualGear.element}
Ability: ${manualGear.ability || 'None'}
Useable By: ${manualGear.useableBy}
Materials Required: ${manualGear.materials || 'Unknown'}

Return your response as JSON with this structure:
{
  "item_name": "string",
  "extracted_stats": { "tier": number, "slot": "string", "quality": "string", "level": number, "attack": number, "defense": number, "resistance": number, "hp": number, "mana": number, "ward": number, "magic": number, "dexterity": number, "foresight": number, "element": "string", "ability": "string" },
  "verdict": "Upgrade|Sidegrade|Downgrade|Wrong class|Situational",
  "color_rating": "green|yellow|red",
  "stat_comparison": [{"stat": "string", "current": number, "new": number, "change": "string"}],
  "synergy_analysis": "string",
  "flags": ["string"],
  "ability_analysis": "string",
  "upgrade_priority": number,
  "rationale": "string"
}`

                            <div className="mb-4">
                                <label className="block text-sm text-gray-400 mb-1">Materials Required</label>
                                <input
                                    type="text"
                                    value={manualGear.materials}
                                    onChange={(e) => setManualGear(prev => ({ ...prev, materials: e.target.value }))}

                            </div>

                            <button
                                onClick={() => evaluateGear(false)}
                                disabled={isLoading || !manualGear.name}
                                className="w-full py-2 bg-gold/20 text-gold rounded hover:bg-gold/30 disabled:opacity-50"
                            >
                                {isLoading ? 'Evaluating...' : 'Evaluate Gear'}
                            </button>
                        </div>
                    )}

                    {isLoading && <LoadingSpinner />}

                    {error && (
                        <div className="bg-red-900/30 border border-red-700/50 rounded-lg p-4 text-red-400">
                            {error}
                        </div>
                    )}

                    {result && (
                        <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4 space-y-4">
                            <div className="flex items-center justify-between flex-wrap gap-2">
                                <h3 className="font-cinzel text-lg text-gold">{result.item_name || 'Evaluation Result'}</h3>
                                <div className="flex items-center gap-2">
                                    <CopyButton
                                        text={`${result.item_name || 'Item'}\nVerdict: ${result.verdict}${result.flags?.length ? '\nFlags: ' + result.flags.join(', ') : ''}${result.synergy_analysis ? '\nSynergy: ' + result.synergy_analysis : ''}${result.ability_analysis ? '\nAbility: ' + result.ability_analysis : ''}${result.upgrade_priority ? '\nPriority: ' + result.upgrade_priority + '/5' : ''}${result.rationale ? '\n\n' + result.rationale : ''}`}
                                        label="Copy"
                                    />
                                    <VerdictBadge verdict={result.verdict} color={result.color_rating} />
                                </div>
                            </div>

                            {result.flags && result.flags.length > 0 && (
                                <div className="flex flex-wrap gap-2">
                                    {result.flags.map((flag, i) => (
                                        <span key={i} className="px-2 py-1 bg-darkred/30 text-sm rounded">{flag}</span>
                                    ))}
                                </div>
                            )}

                            {result.stat_comparison && result.stat_comparison.length > 0 && (
                                <div>
                                    <h4 className="text-sm text-gray-400 mb-2">Stat Comparison</h4>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                        {result.stat_comparison.map((stat, i) => (
                                            <div key={i} className="bg-charcoal rounded p-2 text-sm">
                                                <div className="text-gray-400 text-xs">{stat.stat}</div>
                                                <div className={stat.change?.includes('+') ? 'text-green-400' : stat.change?.includes('-') ? 'text-red-400' : 'text-gray-300'}>
                                                    {stat.current} → {stat.new} ({stat.change})
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {result.synergy_analysis && (
                                <div>
                                    <h4 className="text-sm text-gray-400 mb-1">Synergy Analysis</h4>
                                    <p className="text-sm">{result.synergy_analysis}</p>
                                </div>
                            )}

                            {result.ability_analysis && (
                                <div>
                                    <h4 className="text-sm text-gray-400 mb-1">Ability Analysis</h4>
                                    <p className="text-sm">{result.ability_analysis}</p>
                                </div>
                            )}

                            {result.upgrade_priority && (
                                <div className="flex items-center gap-2">
                                    <span className="text-sm text-gray-400">Upgrade Priority:</span>
                                    <div className="flex gap-1">
                                        {[1,2,3,4,5].map(n => (
                                            <span key={n} className={`w-4 h-4 rounded ${n <= result.upgrade_priority ? 'bg-gold' : 'bg-gray-700'}`}></span>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {result.rationale && (
                                <div className="border-t border-gray-700 pt-3 mt-3">
                                    <p className="text-sm text-gray-300">{result.rationale}</p>
                                </div>
                            )}

                    )}

                    {profileHistory.length > 0 && (
                        <div className="bg-slate/30 border border-darkred/20 rounded-lg p-4">
